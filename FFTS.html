<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FFTS Batch Analyzer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">
  <div class="max-w-7xl mx-auto p-6">
    <h1 class="text-2xl font-bold mb-2">FFTS Batch Analyzer</h1>
    <p class="text-sm text-slate-600 mb-6">複数WAVをドロップすると、1ch=環境音 / 2ch=主音としてFFTし、(主音-環境音)の最大周波数成分を一覧化します。</p>

    <div class="grid grid-cols-1 lg:grid-cols-5 gap-6">
      <div class="lg:col-span-3 space-y-6">
        <div id="drop-zone" class="border-4 border-dashed border-slate-300 bg-white rounded-xl p-10 text-center cursor-pointer hover:border-blue-500 hover:bg-blue-50 transition-colors">
          <p class="text-lg font-semibold">WAVファイルを複数ドロップ</p>
          <p class="text-sm text-slate-500 mt-1">またはクリックして複数選択</p>
          <input id="file-input" class="hidden" type="file" accept=".wav,audio/wav" multiple />
        </div>

        <div class="flex items-center gap-3">
          <button id="download-btn" type="button" class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-lg text-sm font-medium">CSVダウンロード</button>
          <span id="status" class="text-sm text-slate-600"></span>
        </div>

        <div class="bg-white border border-slate-200 rounded-xl p-4">
          <h2 class="font-semibold mb-3">選択ファイルのプレビュー（差し引き後FFT）</h2>
          <div class="grid grid-cols-1 md:grid-cols-4 gap-3 items-end">
            <div><label class="text-xs">開始秒</label><input id="range-start" type="number" step="0.001" value="0" class="w-full border rounded p-2"></div>
            <div><label class="text-xs">終了秒</label><input id="range-end" type="number" step="0.001" value="0" class="w-full border rounded p-2"></div>
            <div><label class="text-xs">開始スライダー</label><input id="range-start-slider" type="range" min="0" max="0" step="0.001" value="0" class="w-full"></div>
            <div><label class="text-xs">終了スライダー</label><input id="range-end-slider" type="range" min="0" max="0" step="0.001" value="0" class="w-full"></div>
          </div>
          <div class="mt-3 flex flex-wrap items-center gap-3">
            <button id="play-btn" type="button" class="bg-blue-600 hover:bg-blue-700 text-white px-3 py-1.5 rounded text-sm">波形再生</button>
            <button id="reanalyze-btn" type="button" class="bg-amber-600 hover:bg-amber-700 text-white px-3 py-1.5 rounded text-sm">再解析</button>
            <label class="text-xs">FFT X上限(Hz)<input id="fft-x-max" type="number" min="0" step="1" class="ml-1 w-24 border rounded p-1"></label>
            <label class="text-xs">FFT Y上限<input id="fft-y-max" type="number" min="0" step="0.0001" class="ml-1 w-24 border rounded p-1"></label>
            <span id="preview-text" class="text-sm text-slate-700">未選択</span>
          </div>
          <div class="mt-3 grid grid-cols-1 md:grid-cols-3 gap-3">
            <div class="border rounded p-2"><p class="text-xs font-medium mb-1">範囲1(Hz)</p><div class="flex items-center gap-2"><input id="peak-range1-start" type="number" min="0" step="0.1" placeholder="start" class="w-full border rounded p-1 text-sm"><span class="text-xs">-</span><input id="peak-range1-end" type="number" min="0" step="0.1" placeholder="end" class="w-full border rounded p-1 text-sm"></div></div>
            <div class="border rounded p-2"><p class="text-xs font-medium mb-1">範囲2(Hz)</p><div class="flex items-center gap-2"><input id="peak-range2-start" type="number" min="0" step="0.1" placeholder="start" class="w-full border rounded p-1 text-sm"><span class="text-xs">-</span><input id="peak-range2-end" type="number" min="0" step="0.1" placeholder="end" class="w-full border rounded p-1 text-sm"></div></div>
            <div class="border rounded p-2"><p class="text-xs font-medium mb-1">範囲3(Hz)</p><div class="flex items-center gap-2"><input id="peak-range3-start" type="number" min="0" step="0.1" placeholder="start" class="w-full border rounded p-1 text-sm"><span class="text-xs">-</span><input id="peak-range3-end" type="number" min="0" step="0.1" placeholder="end" class="w-full border rounded p-1 text-sm"></div></div>
          </div>
          <div class="mt-4 grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="bg-slate-50 border border-slate-200 rounded p-2 h-56"><canvas id="wave-preview"></canvas></div>
            <div class="bg-slate-50 border border-slate-200 rounded p-2 h-56"><canvas id="fft-preview"></canvas></div>
          </div>
        </div>
      </div>

      <div class="lg:col-span-2 bg-white border border-slate-200 rounded-xl overflow-hidden h-[72vh] min-h-[480px] flex flex-col">
        <div class="px-4 py-3 border-b border-slate-200 bg-slate-50">
          <h2 class="font-semibold">解析結果テーブル</h2>
        </div>
        <div class="overflow-auto flex-1">
          <table class="min-w-full text-sm">
            <thead class="bg-slate-100 sticky top-0 z-10">
              <tr>
                <th id="sort-name" class="text-left p-3 cursor-pointer">ファイル名 ↕</th>
                <th id="sort-freq" class="text-right p-3 cursor-pointer">最大周波数 (Hz) ↕</th>
                <th id="sort-amp" class="text-right p-3 cursor-pointer">振幅 ↕</th>
              </tr>
            </thead>
            <tbody id="result-body"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

<script>
(() => {
  const dropZone = document.getElementById('drop-zone');
  const fileInput = document.getElementById('file-input');
  const resultBody = document.getElementById('result-body');
  const downloadBtn = document.getElementById('download-btn');
  const statusText = document.getElementById('status');
  const rangeStartInput = document.getElementById('range-start');
  const rangeEndInput = document.getElementById('range-end');
  const rangeStartSlider = document.getElementById('range-start-slider');
  const rangeEndSlider = document.getElementById('range-end-slider');
  const playBtn = document.getElementById('play-btn');
  const reanalyzeBtn = document.getElementById('reanalyze-btn');
  const previewText = document.getElementById('preview-text');
  const fftXMaxInput = document.getElementById('fft-x-max');
  const fftYMaxInput = document.getElementById('fft-y-max');
  const sortName = document.getElementById('sort-name');
  const sortFreq = document.getElementById('sort-freq');
  const sortAmp = document.getElementById('sort-amp');
  const tableHeadRow = document.querySelector('thead tr');
  const wavePreviewCanvas = document.getElementById('wave-preview');
  const fftPreviewCanvas = document.getElementById('fft-preview');
  const peakRangeInputs = [
    { start: document.getElementById('peak-range1-start'), end: document.getElementById('peak-range1-end') },
    { start: document.getElementById('peak-range2-start'), end: document.getElementById('peak-range2-end') },
    { start: document.getElementById('peak-range3-start'), end: document.getElementById('peak-range3-end') }
  ];

  let results = [];
  let analyzedData = [];
  let selectedIndex = -1;
  let audioCtx = null;
  let currentSource = null;
  let sortKey = 'name';
  let sortDir = 'asc';
  let waveChart = null;
  let fftChart = null;

  dropZone.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', async (e) => {
    if (e.target.files.length > 0) await processFiles(Array.from(e.target.files));
    e.target.value = '';
  });

  dropZone.addEventListener('dragover', (e) => {
    e.preventDefault();
    dropZone.classList.add('border-blue-500', 'bg-blue-50');
  });
  dropZone.addEventListener('dragleave', () => {
    dropZone.classList.remove('border-blue-500', 'bg-blue-50');
  });
  dropZone.addEventListener('drop', async (e) => {
    e.preventDefault();
    dropZone.classList.remove('border-blue-500', 'bg-blue-50');
    const wavs = Array.from(e.dataTransfer.files).filter(f => f.name.toLowerCase().endsWith('.wav'));
    if (wavs.length > 0) await processFiles(wavs);
  });

  window.addEventListener('dragover', (e) => e.preventDefault());
  window.addEventListener('drop', (e) => e.preventDefault());

  downloadBtn.addEventListener('click', () => {
    if (results.length === 0) return;
    const ranges = getConfiguredPeakRanges();
    const headerCols = ['name','max_frequency_hz','amplitude'];
    for (let i = 0; i < ranges.length; i++) headerCols.push(`range${i + 1}_label_hz`, `range${i + 1}_max_frequency_hz`, `range${i + 1}_amplitude`);
    const rows = getSortedResults().map(r => {
      const cols = [escapeCsv(r.name), r.maxFreq, r.maxAmp];
      for (const p of (r.rangePeaks || [])) cols.push(escapeCsv(p.label), p.maxFreq, p.maxAmp);
      return cols.join(',');
    });
    const header = headerCols.join(',') + '\n';
    const blob = new Blob([header + rows.join('\n')], { type: 'text/csv' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'ffts_batch_results.csv';
    a.click();
    URL.revokeObjectURL(a.href);
  });

  function escapeCsv(s) {
    const t = String(s);
    if (t.includes(',') || t.includes('"') || t.includes('\n')) {
      return '"' + t.replace(/"/g, '""') + '"';
    }
    return t;
  }

  async function processFiles(files) {
    results = [];
    analyzedData = [];
    selectedIndex = -1;
    resultBody.innerHTML = '';
    statusText.textContent = `処理中... (${files.length} files)`;

    for (const file of files) {
      try {
        const res = await analyzeWav(file);
        analyzedData.push(res.detail);
      } catch (err) {
        analyzedData.push({ name: file.name, error: err.message, fs: 0, main: new Float32Array(), ambient: new Float32Array(), len: 0, duration: 0 });
      }
    }
    const firstValid = analyzedData.find(d => !d.error);
    if (firstValid) {
      rangeStartInput.value = 0;
      rangeEndInput.value = firstValid.duration.toFixed(3);
    }
    recalculateAllResults();
  }

  function appendRow(r, idx = -1) {
    const tr = document.createElement('tr');
    tr.className = 'border-t border-slate-100 cursor-pointer hover:bg-slate-50';
    const rangeCols = (r.rangePeaks || []).map(p => `<td class="p-3 text-right">${p.maxFreq && p.maxAmp ? `${p.maxFreq} Hz / ${p.maxAmp}` : '-'}</td>`).join('');
    tr.innerHTML = `
      <td class="p-3">${r.name}</td>
      <td class="p-3 text-right">${r.maxFreq}</td>
      <td class="p-3 text-right">${r.maxAmp}</td>
      ${rangeCols}
    `;
    if (idx >= 0) tr.addEventListener('click', () => selectFile(idx));
    resultBody.appendChild(tr);
  }

  async function analyzeWav(file) {
    const arrayBuffer = await file.arrayBuffer();
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const audioBuffer = await new Promise((resolve, reject) => audioCtx.decodeAudioData(arrayBuffer, resolve, reject));

    if (audioBuffer.numberOfChannels < 2) {
      throw new Error('2ch未満のため解析不可');
    }

    const fs = audioBuffer.sampleRate;
    const ambient = audioBuffer.getChannelData(0);
    const main = audioBuffer.getChannelData(1);
    const len = Math.min(ambient.length, main.length);

    let N = 1;
    while (N * 2 <= len && N * 2 <= 65536) N *= 2;

    const mainSpec = computeSpectrum(main, N, fs);
    const ambientSpec = computeSpectrum(ambient, N, fs);

    const amps = new Float64Array(mainSpec.amps.length);
    for (let i = 0; i < amps.length; i++) amps[i] = Math.max(0, mainSpec.amps[i] - ambientSpec.amps[i]);

    let peakIdx = 0;
    let peakAmp = -Infinity;
    for (let i = 1; i < amps.length; i++) {
      if (amps[i] > peakAmp) {
        peakAmp = amps[i];
        peakIdx = i;
      }
    }

    return {
      summary: { name: file.name, maxFreq: mainSpec.freqs[peakIdx].toFixed(2), maxAmp: peakAmp.toFixed(6) },
      detail: { name: file.name, fs, main, ambient, len, duration: len / fs }
    };
  }



  function selectFile(idx) {
    selectedIndex = idx;
    syncSliderToInputs();
    updatePreview();
  }

  sortName.addEventListener('click', () => toggleSort('name'));
  sortFreq.addEventListener('click', () => toggleSort('maxFreq'));
  sortAmp.addEventListener('click', () => toggleSort('maxAmp'));
  fftXMaxInput.addEventListener('input', () => { if (selectedIndex >= 0) updatePreview(); });
  fftYMaxInput.addEventListener('input', () => { if (selectedIndex >= 0) updatePreview(); });
  for (const pair of peakRangeInputs) {
    pair.start.addEventListener('change', recalculateAllResults);
    pair.end.addEventListener('change', recalculateAllResults);
  }

  function toggleSort(key) {
    if (sortKey === key) sortDir = sortDir === 'asc' ? 'desc' : 'asc';
    else { sortKey = key; sortDir = 'asc'; }
    renderResultTable();
  }

  function getSortedResults() {
    const arr = results.map((r, i) => ({ ...r, _idx: i }));
    const mul = sortDir === 'asc' ? 1 : -1;
    arr.sort((a, b) => {
      const ae = a.maxFreq === 'ERROR', be = b.maxFreq === 'ERROR';
      if (ae || be) return ae === be ? 0 : 1;
      if (sortKey === 'name') return a.name.localeCompare(b.name) * mul;
      return ((parseFloat(a[sortKey]) - parseFloat(b[sortKey])) * mul);
    });
    return arr;
  }

  function renderResultTable() {
    renderTableHeader();
    resultBody.innerHTML = '';
    getSortedResults().forEach((r) => appendRow(r, analyzedData[r._idx].error ? -1 : r._idx));
  }

  function renderTableHeader() {
    const ranges = getConfiguredPeakRanges();
    tableHeadRow.innerHTML = `
      <th id="sort-name" class="text-left p-3 cursor-pointer">ファイル名 ↕</th>
      <th id="sort-freq" class="text-right p-3 cursor-pointer">最大周波数 (Hz) ↕</th>
      <th id="sort-amp" class="text-right p-3 cursor-pointer">振幅 ↕</th>
      ${ranges.map((r, i) => `<th class="text-right p-3">範囲${i + 1} ${r.start.toFixed(1)}-${r.end.toFixed(1)}Hz 最大</th>`).join('')}
    `;
    document.getElementById('sort-name').addEventListener('click', () => toggleSort('name'));
    document.getElementById('sort-freq').addEventListener('click', () => toggleSort('maxFreq'));
    document.getElementById('sort-amp').addEventListener('click', () => toggleSort('maxAmp'));
  }

  function getGlobalMaxDuration() {
    let max = 0;
    for (const d of analyzedData) {
      if (!d.error && Number.isFinite(d.duration)) max = Math.max(max, d.duration);
    }
    return max;
  }

  function syncSliderToInputs() {
    const globalMax = getGlobalMaxDuration();
    rangeStartInput.max = globalMax;
    rangeEndInput.max = globalMax;
    rangeStartSlider.max = globalMax;
    rangeEndSlider.max = globalMax;

    const s = parseFloat(rangeStartInput.value || '0');
    const e = parseFloat(rangeEndInput.value || '0');
    if (Number.isFinite(s)) rangeStartSlider.value = Math.max(0, Math.min(globalMax, s));
    if (Number.isFinite(e)) rangeEndSlider.value = Math.max(0, Math.min(globalMax, e));
  }

  function syncRange(from, commit = false) {
    if (selectedIndex < 0) return;
    const max = analyzedData[selectedIndex].duration;
    let s = parseFloat(rangeStartInput.value || '0');
    let e = parseFloat(rangeEndInput.value || '0');
    if (from === 'ss') s = parseFloat(rangeStartSlider.value || '0');
    if (from === 'es') e = parseFloat(rangeEndSlider.value || '0');
    if (commit) {
      if (e < s) [s, e] = [e, s];
      s = Math.max(0, Math.min(max, s));
      e = Math.max(0, Math.min(max, e));
      rangeStartInput.value = s;
      rangeEndInput.value = e;
      rangeStartSlider.value = s;
      rangeEndSlider.value = e;
      updatePreview();
    } else {
      if (from === 'si') rangeStartSlider.value = Math.max(0, Math.min(max, s || 0));
      if (from === 'ei') rangeEndSlider.value = Math.max(0, Math.min(max, e || 0));
    }
  }

  function updatePreview() {
    if (selectedIndex < 0) return;
    const d = analyzedData[selectedIndex];
    const { s, e } = getCurrentRangeForDetail(d);
    const sIdx = Math.floor(s * d.fs);
    const eIdx = Math.min(d.len, Math.max(sIdx + 8, Math.floor(e * d.fs)));
    const mainSlice = d.main.slice(sIdx, eIdx);
    const ambSlice = d.ambient.slice(sIdx, eIdx);
    let N = 1; while (N * 2 <= mainSlice.length) N *= 2;
    const m = computeSpectrum(mainSlice, N, d.fs);
    const a = computeSpectrum(ambSlice, N, d.fs);
    let pIdx = 1, pAmp = -Infinity;
    const sub = new Float64Array(m.amps.length);
    for (let i = 1; i < m.amps.length; i++) {
      const v = Math.max(0, m.amps[i] - a.amps[i]); sub[i] = v;
      if (v > pAmp) { pAmp = v; pIdx = i; }
    }
    previewText.textContent = `${d.name} | ${s.toFixed(3)}s〜${e.toFixed(3)}s | Peak ${m.freqs[pIdx].toFixed(2)} Hz / ${pAmp.toFixed(6)}`;
    renderCharts(d, sIdx, eIdx, m.freqs, sub);
  }

  function getCurrentRangeForDetail(d) {
    const max = d.duration;
    let s = parseFloat(rangeStartInput.value || '0');
    let e = parseFloat(rangeEndInput.value || String(max));
    if (!Number.isFinite(s)) s = 0;
    if (!Number.isFinite(e)) e = max;
    if (e < s) [s, e] = [e, s];
    s = Math.max(0, Math.min(max, s));
    e = Math.max(0, Math.min(max, e));
    return { s, e };
  }

  function analyzeRangeDetail(d) {
    if (d.error) return { name: d.name, maxFreq: 'ERROR', maxAmp: d.error };
    const { s, e } = getCurrentRangeForDetail(d);
    const sIdx = Math.floor(s * d.fs);
    const eIdx = Math.min(d.len, Math.max(sIdx + 8, Math.floor(e * d.fs)));
    const mainSlice = d.main.slice(sIdx, eIdx);
    const ambSlice = d.ambient.slice(sIdx, eIdx);
    let N = 1; while (N * 2 <= mainSlice.length) N *= 2;
    const m = computeSpectrum(mainSlice, N, d.fs);
    const a = computeSpectrum(ambSlice, N, d.fs);
    let pIdx = 1, pAmp = -Infinity;
    for (let i = 1; i < m.amps.length; i++) {
      const v = Math.max(0, m.amps[i] - a.amps[i]);
      if (v > pAmp) { pAmp = v; pIdx = i; }
    }
    const rangePeaks = getConfiguredPeakRanges().map(r => findPeakInFrequencyRange(m.freqs, m.amps, a.amps, r.start, r.end));
    return { name: d.name, maxFreq: m.freqs[pIdx].toFixed(2), maxAmp: pAmp.toFixed(6), rangePeaks };
  }

  function getConfiguredPeakRanges() {
    const ranges = [];
    for (const pair of peakRangeInputs) {
      const s = parseFloat(pair.start.value || '');
      const e = parseFloat(pair.end.value || '');
      if (!Number.isFinite(s) || !Number.isFinite(e)) continue;
      const start = Math.max(0, Math.min(s, e));
      const end = Math.max(0, Math.max(s, e));
      if (end > start) ranges.push({ start, end });
    }
    return ranges;
  }

  function findPeakInFrequencyRange(freqs, mainAmps, ambAmps, startHz, endHz) {
    let bestIdx = -1;
    let bestAmp = -Infinity;
    for (let i = 1; i < freqs.length; i++) {
      const f = freqs[i];
      if (f < startHz || f > endHz) continue;
      const v = Math.max(0, mainAmps[i] - ambAmps[i]);
      if (v > bestAmp) { bestAmp = v; bestIdx = i; }
    }
    const label = `${startHz.toFixed(1)}-${endHz.toFixed(1)}Hz`;
    if (bestIdx < 0) return { label, maxFreq: '', maxAmp: '' };
    return { label, maxFreq: freqs[bestIdx].toFixed(2), maxAmp: bestAmp.toFixed(6) };
  }

  function recalculateAllResults() {
    results = analyzedData.map(d => analyzeRangeDetail(d));
    renderResultTable();
    const success = results.filter(r => r.maxFreq !== 'ERROR').length;
    statusText.textContent = `完了: ${success} 件成功 / ${results.length} 件`;
    syncSliderToInputs();
    if (selectedIndex < 0) {
      const firstValidIdx = analyzedData.findIndex(d => !d.error);
      if (firstValidIdx >= 0) selectFile(firstValidIdx);
    } else {
      updatePreview();
    }
  }

  function renderCharts(d, sIdx, eIdx, freqs, subAmps) {
    const step = Math.max(1, Math.floor((eIdx - sIdx) / 1500));
    const wave = [];
    for (let i = sIdx; i < eIdx; i += step) wave.push({ x: i / d.fs, y: d.main[i] ?? 0 });
    if (waveChart) waveChart.destroy();
    waveChart = new Chart(wavePreviewCanvas.getContext('2d'), {
      type: 'line',
      data: { datasets: [{ data: wave, borderColor: '#3b82f6', pointRadius: 0, borderWidth: 1 }] },
      options: { animation: false, responsive: true, maintainAspectRatio: false, parsing: false, scales: { x: { type: 'linear' } } }
    });
    const fft = buildPeakPreservingFftSeries(freqs, subAmps, 1500);
    if (fftChart) fftChart.destroy();
    const fftXMax = parseFloat(fftXMaxInput.value);
    const fftYMax = parseFloat(fftYMaxInput.value);
    fftChart = new Chart(fftPreviewCanvas.getContext('2d'), {
      type: 'line',
      data: { datasets: [{ label: 'subtracted spectrum', data: fft.filter(p => p.x > 0), borderColor: '#ef4444', pointRadius: 0, borderWidth: 1, fill: true, backgroundColor: 'rgba(239,68,68,0.12)' }] },
      options: {
        animation: false,
        responsive: true,
        maintainAspectRatio: false,
        parsing: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { type: 'linear', max: Number.isFinite(fftXMax) && fftXMax > 0 ? fftXMax : undefined },
          y: { max: Number.isFinite(fftYMax) && fftYMax > 0 ? fftYMax : undefined }
        }
      }
    });
  }

  function buildPeakPreservingFftSeries(freqs, amps, maxPoints = 1500) {
    const n = freqs.length;
    if (n <= maxPoints) {
      const full = [];
      for (let i = 0; i < n; i++) full.push({ x: freqs[i], y: amps[i] ?? 0 });
      return full;
    }

    const bucketSize = Math.ceil(n / maxPoints);
    const points = [];
    for (let start = 0; start < n; start += bucketSize) {
      const end = Math.min(n, start + bucketSize);
      let peakIdx = start;
      let peakAmp = -Infinity;
      for (let i = start; i < end; i++) {
        const amp = amps[i] ?? 0;
        if (amp > peakAmp) {
          peakAmp = amp;
          peakIdx = i;
        }
      }
      points.push({ x: freqs[peakIdx], y: peakAmp });
    }
    return points;
  }

  async function playSelectedRange() {
    if (selectedIndex < 0) return;
    const d = analyzedData[selectedIndex];
    const { s, e } = getCurrentRangeForDetail(d);
    const sIdx = Math.floor(s * d.fs);
    const eIdx = Math.min(d.len, Math.max(sIdx + 1, Math.floor(e * d.fs)));
    const len = eIdx - sIdx;
    if (len <= 1) return;
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') await audioCtx.resume();
    if (currentSource) {
      try { currentSource.stop(); } catch (_) {}
      currentSource.disconnect();
      currentSource = null;
    }
    const buf = audioCtx.createBuffer(1, len, d.fs);
    const ch = buf.getChannelData(0);
    for (let i = 0; i < len; i++) ch[i] = d.main[sIdx + i] ?? 0;
    const src = audioCtx.createBufferSource();
    src.buffer = buf; src.connect(audioCtx.destination); src.start();
    src.onended = () => { if (currentSource === src) currentSource = null; };
    currentSource = src;
  }

  function handleRangeInputLive(which) {
    const el = which === 'si' ? rangeStartInput : rangeEndInput;
    const v = el.value.trim();
    if (v === '' || v === '-' || v === '.' || v === '-.') {
      syncRange(which, false);
      return;
    }
    syncRange(which, false);
  }

  rangeStartInput.addEventListener('input', () => handleRangeInputLive('si'));
  rangeEndInput.addEventListener('input', () => handleRangeInputLive('ei'));
  rangeStartInput.addEventListener('change', () => syncRange('si', true));
  rangeEndInput.addEventListener('change', () => syncRange('ei', true));
  rangeStartSlider.addEventListener('input', () => syncRange('ss', true));
  rangeEndSlider.addEventListener('input', () => syncRange('es', true));
  playBtn.addEventListener('click', playSelectedRange);
  reanalyzeBtn.addEventListener('click', () => {
    if (analyzedData.length === 0) return;
    recalculateAllResults();
    if (selectedIndex >= 0) updatePreview();
  });

  function computeSpectrum(signal, N, fs) {
    const real = new Float64Array(N);
    const imag = new Float64Array(N);
    for (let i = 0; i < N; i++) real[i] = signal[i] ?? 0;

    fftIterative(real, imag);

    const halfN = N / 2;
    const freqs = new Float64Array(halfN);
    const amps = new Float64Array(halfN);
    for (let k = 0; k < halfN; k++) {
      freqs[k] = k * fs / N;
      const mag = Math.sqrt(real[k] * real[k] + imag[k] * imag[k]);
      amps[k] = (k === 0) ? mag / N : 2 * mag / N;
    }
    return { freqs, amps };
  }

  function fftIterative(real, imag) {
    const n = real.length;
    let j = 0;
    for (let i = 1; i < n; i++) {
      let bit = n >> 1;
      while (j & bit) {
        j ^= bit;
        bit >>= 1;
      }
      j |= bit;
      if (i < j) {
        [real[i], real[j]] = [real[j], real[i]];
        [imag[i], imag[j]] = [imag[j], imag[i]];
      }
    }

    for (let len = 2; len <= n; len <<= 1) {
      const ang = -2 * Math.PI / len;
      const wlenCos = Math.cos(ang);
      const wlenSin = Math.sin(ang);

      for (let i = 0; i < n; i += len) {
        let wCos = 1;
        let wSin = 0;
        for (let k = 0; k < len / 2; k++) {
          const uRe = real[i + k];
          const uIm = imag[i + k];
          const vRe = real[i + k + len / 2] * wCos - imag[i + k + len / 2] * wSin;
          const vIm = real[i + k + len / 2] * wSin + imag[i + k + len / 2] * wCos;

          real[i + k] = uRe + vRe;
          imag[i + k] = uIm + vIm;
          real[i + k + len / 2] = uRe - vRe;
          imag[i + k + len / 2] = uIm - vIm;

          const nextCos = wCos * wlenCos - wSin * wlenSin;
          wSin = wCos * wlenSin + wSin * wlenCos;
          wCos = nextCos;
        }
      }
    }
  }
})();
</script>
