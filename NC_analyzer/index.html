<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NC値算出＆レポートジェネレーター</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone@7.26.9/babel.min.js"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- JSZip -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <!-- Pyodide (Excel生成用バックエンド) -->
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    <style>
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3498db;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        /* ドラッグ選択時のテキスト選択を無効化 */
        .select-none { user-select: none; -webkit-user-select: none; }
        .drag-handle { cursor: grab; }
        .drag-handle:active { cursor: grabbing; }
        .dragging { opacity: 0.5; border: 2px dashed #3b82f6; }
    </style>
</head>
<body class="bg-slate-50 text-gray-800 font-sans min-h-screen">
    <div id="root"></div>

    <script type="text/babel" data-presets="env,react">
        // --- 初期データの読み込み (HTMLエクスポート対応) ---
        const getInitialState = () => {
            const el = document.getElementById('initial-data');
            if (el && el.textContent) {
                try { 
                    const text = el.textContent.trim();
                    if (text.startsWith('%7B')) {
                        return JSON.parse(decodeURIComponent(text));
                    } else {
                        return JSON.parse(text); 
                    }
                } catch(e) {
                    console.error("初期データの読み込みに失敗しました:", e);
                }
            }
            return null;
        };
        const initState = getInitialState();
        const isExportedViewerMode = initState !== null; // 出力されたHTMLビューアーかどうかの判定


        const WORKSPACE_DB_NAME = 'nc_analyzer_workspace_db';
        const WORKSPACE_DB_VERSION = 1;
        const WORKSPACE_DB_STORE = 'workspace_data';
        const WORKSPACE_HANDLE_KEY = 'workspace_file_handle_v1';
        const WORKSPACE_FILE_NAME_KEY = 'workspace_file_name_v1';

        const openWorkspaceDB = () => new Promise((resolve, reject) => {
            if (typeof indexedDB === 'undefined') {
                reject(new Error('IndexedDB is not supported in this environment.'));
                return;
            }
            const request = indexedDB.open(WORKSPACE_DB_NAME, WORKSPACE_DB_VERSION);
            request.onupgradeneeded = (event) => {
                const db = event.target.result;
                if (!db.objectStoreNames.contains(WORKSPACE_DB_STORE)) db.createObjectStore(WORKSPACE_DB_STORE);
            };
            request.onsuccess = () => resolve(request.result);
            request.onerror = () => reject(request.error || new Error('Failed to open IndexedDB.'));
        });

        const workspaceDbGet = async (key) => {
            const db = await openWorkspaceDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(WORKSPACE_DB_STORE, 'readonly');
                const store = tx.objectStore(WORKSPACE_DB_STORE);
                const request = store.get(key);
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error || new Error('IndexedDB read failed.'));
                tx.oncomplete = () => db.close();
                tx.onabort = tx.onerror = () => db.close();
            });
        };

        const workspaceDbSet = async (key, value) => {
            const db = await openWorkspaceDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(WORKSPACE_DB_STORE, 'readwrite');
                const store = tx.objectStore(WORKSPACE_DB_STORE);
                store.put(value, key);
                tx.oncomplete = () => { db.close(); resolve(); };
                tx.onabort = tx.onerror = () => { db.close(); reject(tx.error || new Error('IndexedDB write failed.')); };
            });
        };

        const verifyFileHandlePermission = async (fileHandle, readWrite = false) => {
            if (!fileHandle) return false;
            const options = readWrite ? { mode: 'readwrite' } : {};
            if (typeof fileHandle.queryPermission === 'function') {
                const queryState = await fileHandle.queryPermission(options);
                if (queryState === 'granted') return true;
                if (queryState === 'denied' && typeof fileHandle.requestPermission !== 'function') return false;
            }
            if (typeof fileHandle.requestPermission === 'function') {
                return (await fileHandle.requestPermission(options)) === 'granted';
            }
            return true;
        };

        // NC曲線の基準テーブル
        const ncBaseTables = {
            15: [47, 36, 29, 22, 17, 14, 12, 11],
            20: [51, 40, 33, 26, 22, 19, 17, 16],
            25: [54, 44, 37, 31, 27, 24, 22, 21],
            30: [57, 48, 41, 35, 31, 29, 28, 27],
            35: [60, 52, 45, 40, 36, 34, 33, 32],
            40: [64, 56, 50, 45, 41, 39, 38, 37],
            45: [67, 60, 54, 49, 46, 44, 43, 42],
            50: [71, 64, 58, 54, 51, 49, 48, 47],
            55: [74, 67, 62, 58, 56, 54, 53, 52],
            60: [77, 71, 67, 63, 61, 59, 58, 57],
            65: [80, 75, 71, 68, 66, 64, 63, 62],
            70: [83, 79, 75, 72, 71, 70, 69, 68]
        };

        const ncColors = {
            15: '#1f77b4', 20: '#ff7f0e', 25: '#2ca02c', 30: '#d62728',
            35: '#9467bd', 40: '#8c564b', 45: '#e377c2', 50: '#7f7f7f',
            55: '#bcbd22', 60: '#17becf', 65: '#000080', 70: '#ffd700'
        };

        const dataColors = ["#8B4513", "#006400", "#00008B", "#4B0082", "#8B0000", "#2F4F4F", "#D2691E", "#556B2F"];
        const CHART_COPY_ASPECT_RATIO = 1537 / 1287;
        const FIXED_COPY_SCALE_BASE_WIDTH = 500;

        const hexToRgba = (hex, alpha) => {
            let r = 0, g = 0, b = 0;
            if (hex.startsWith('#')) {
                if (hex.length === 7) {
                    r = parseInt(hex.slice(1, 3), 16);
                    g = parseInt(hex.slice(3, 5), 16);
                    b = parseInt(hex.slice(5, 7), 16);
                } else if (hex.length === 4) {
                    r = parseInt(hex[1]+hex[1], 16);
                    g = parseInt(hex[2]+hex[2], 16);
                    b = parseInt(hex[3]+hex[3], 16);
                }
            }
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        };

        const targetOctFreqs = [63, 125, 250, 500, 1000, 2000, 4000, 8000];
        const allFreqs = [63, 80, 100, 125, 160, 200, 250, 315, 400, 500, 630, 800, 1000, 1250, 1600, 2000, 2500, 3150, 4000, 5000, 6300, 8000];

        function getLabelStr(f) {
            return f >= 1000 ? (f/1000).toString() + 'k' : f.toString();
        }

        function interpolateCurve(freqs, values, targetFreqs) {
            return targetFreqs.map(tf => {
                if (tf <= freqs[0]) return values[0];
                if (tf >= freqs[freqs.length - 1]) return values[values.length - 1];
                let idx = 0;
                while (freqs[idx + 1] < tf) idx++;
                const f0 = freqs[idx];
                const f1 = freqs[idx + 1];
                const v0 = values[idx];
                const v1 = values[idx + 1];
                const ratio = (Math.log10(tf) - Math.log10(f0)) / (Math.log10(f1) - Math.log10(f0));
                return Math.round((v0 + (v1 - v0) * ratio) * 10) / 10;
            });
        }

        function findValueForFreq(rawFreqs, rawValues, targetFreq) {
            for(let i=0; i<rawFreqs.length; i++) {
                if (Math.abs(rawFreqs[i] - targetFreq) / targetFreq < 0.05) {
                    return rawValues[i];
                }
            }
            return NaN;
        }

        function synthesize1to1(rawFreqs, rawValues) {
            const bands = [
                [50, 63, 80], [100, 125, 160], [200, 250, 315], [400, 500, 630],
                [800, 1000, 1250], [1600, 2000, 2500], [3150, 4000, 5000], [6300, 8000, 10000]
            ];
            return targetOctFreqs.map((_, i) => {
                let sum = 0;
                let foundAny = false;
                bands[i].forEach(f => {
                    const val = findValueForFreq(rawFreqs, rawValues, f);
                    if (!isNaN(val)) {
                        sum += Math.pow(10, val / 10);
                        foundAny = true;
                    }
                });
                return (foundAny && sum > 0) ? (10 * Math.log10(sum)) : NaN;
            });
        }

        function getProcessedItemData(rawFreqs, rawValues, isOriginalThird, displayOctaveMode) {
            let finalValues = new Array(allFreqs.length).fill(null);
            if (displayOctaveMode === '1/1') {
                let octVals;
                if (isOriginalThird) {
                    octVals = synthesize1to1(rawFreqs, rawValues);
                } else {
                    octVals = targetOctFreqs.map(f => findValueForFreq(rawFreqs, rawValues, f));
                }
                targetOctFreqs.forEach((tf, i) => {
                    const idx = allFreqs.indexOf(tf);
                    finalValues[idx] = isNaN(octVals[i]) ? null : octVals[i];
                });
            } else {
                allFreqs.forEach((tf, i) => {
                    const val = findValueForFreq(rawFreqs, rawValues, tf);
                    finalValues[i] = isNaN(val) ? null : val;
                });
            }
            return finalValues;
        }

        function getNcCurve(ncTarget) {
            if (ncTarget <= 15) return [...ncBaseTables[15]];
            if (ncTarget >= 70) return [...ncBaseTables[70]];
            const lower = Math.floor(ncTarget / 5) * 5;
            const upper = lower + 5;
            if (lower === ncTarget) return [...ncBaseTables[lower]];
            const ratio = (ncTarget - lower) / 5;
            const lowerCurve = ncBaseTables[lower];
            const upperCurve = ncBaseTables[upper];
            return lowerCurve.map((val, idx) => {
                const interp = val + (upperCurve[idx] - val) * ratio;
                return Math.round(interp * 10) / 10;
            });
        }

        function getNcCurveInterpolated(ncTarget, targetFreqs) {
            const octVals = getNcCurve(ncTarget);
            return interpolateCurve(targetOctFreqs, octVals, targetFreqs);
        }

        function subtractBackgroundNoiseArray(measuredValues, bgValues, method) {
            return measuredValues.map((m, i) => {
                if (m === null) return null;
                const b = bgValues[i];
                if (b === null || isNaN(b)) return m;
                if (method === 'arithmetic') {
                    const val = m - b;
                    return Math.max(0, Math.round(val * 10) / 10);
                } else {
                    if (m <= b) return m; 
                    const val = 10 * Math.log10(Math.pow(10, m / 10) - Math.pow(10, b / 10));
                    return Math.round(val * 10) / 10;
                }
            });
        }


        function addBackgroundNoiseArray(measuredValues, bgValues) {
            return measuredValues.map((m, i) => {
                if (m === null) return null;
                const b = bgValues[i];
                if (b === null || isNaN(b)) return m;
                const val = 10 * Math.log10(Math.pow(10, m / 10) + Math.pow(10, b / 10));
                return Math.round(val * 10) / 10;
            });
        }

        function getRequiredNcForFrequency(freq, value) {
            if (value === null || isNaN(value)) return null;
            let requiredNc = 15;
            for (let nc = 15; nc <= 70; nc++) {
                const threshold = getNcCurveInterpolated(nc, [freq])[0];
                if (value <= threshold) return nc;
                if (nc === 70 && value > threshold) requiredNc = ">70";
            }
            return requiredNc;
        }

        function calculateNC(allFreqsValues) {
            let maxNcRequired = 14; 
            for (let i = 0; i < allFreqs.length; i++) {
                const val = allFreqsValues[i];
                if (val === null || isNaN(val)) continue;
                
                let requiredNc = 15;
                for (let nc = 15; nc <= 70; nc++) {
                    const curveVals = getNcCurveInterpolated(nc, [allFreqs[i]]);
                    const threshold = curveVals[0];
                    if (val <= threshold) {
                        requiredNc = nc;
                        break;
                    }
                    if (nc === 70 && val > threshold) {
                        requiredNc = ">70";
                    }
                }
                if (requiredNc === ">70") return ">70";
                if (requiredNc > maxNcRequired) {
                    maxNcRequired = requiredNc;
                }
            }
            return maxNcRequired < 15 ? "<15" : maxNcRequired;
        }

        const GroupChart = ({ groupName, projectName, items, bgGraphItem, addGraphItem, visibleNcCurves, lineWidth, pointSize, axisLineWidth, axisLabelFontSize, tickFontSize, copyLegendFontSize, yAxisMaxAuto, yAxisMaxManual, useFixedCopyAspectRatio, isViewerMode, setDataItems, setGroups, onRemoveItem, onToggleVisible, onMoveItems, groups, projects, groupProjects, onDuplicateGroup, onMoveGroupToProject, onDragStart, onDragOver, onDrop, isDraggingThis }) => {
            const chartRef = React.useRef(null);
            const chartInstance = React.useRef(null);
            
            const [highlightedLabels, setHighlightedLabels] = React.useState(new Set());
            const [hiddenLabels, setHiddenLabels] = React.useState(new Set());
            const [isolatedLabels, setIsolatedLabels] = React.useState(new Set());
            const [legendItems, setLegendItems] = React.useState([]);
            const [legendCopyColumns, setLegendCopyColumns] = React.useState(1);
            const [showLegendCopyModal, setShowLegendCopyModal] = React.useState(false);
            
            const [isMaximized, setIsMaximized] = React.useState(false);
            const [showDataModal, setShowDataModal] = React.useState(false);
            const [targetProjectForGroup, setTargetProjectForGroup] = React.useState(projectName || '');
            const [isDraggable, setIsDraggable] = React.useState(false);
            
            const clickState = React.useRef({ lastTime: 0, timer: null });
            const hoveredLegendRef = React.useRef(null);

            const toggleHighlightedLabel = React.useCallback((label) => {
                setHighlightedLabels(prev => {
                    const next = new Set(prev);
                    if (next.has(label)) next.delete(label);
                    else next.add(label);
                    return next;
                });
            }, []);

            const clearHighlightedLabels = React.useCallback(() => {
                setHighlightedLabels(new Set());
            }, []);

            React.useEffect(() => {
                setTargetProjectForGroup(projectName || '');
            }, [projectName]);

            React.useEffect(() => {
                if (!chartRef.current || items.length === 0) return;
                const ctx = chartRef.current.getContext('2d');

                let maxVal = 0;
                const datasets = [];
                const hasThird = items.some(item => item.appliedOctMode === '1/3');
                const activeFreqs = hasThird ? allFreqs : targetOctFreqs;

                // 背景のNCカーブ
                for(let nc = 15; nc <= 65; nc += 5) {
                    if(visibleNcCurves.includes(nc)) {
                        const label = `NC-${nc}`;
                        const curveDataRaw = getNcCurve(nc);
                        maxVal = Math.max(maxVal, curveDataRaw[0]); 
                        const curveData = activeFreqs.map(f => getNcCurveInterpolated(nc, [f])[0]);
                        const hexColor = ncColors[nc] || '#ff4d4f';
                        
                        const isHighlighted = highlightedLabels.has(label);
                        const isHidden = hiddenLabels.has(label);
                        const color = hexColor; // NCカーブは常に半透明にしない

                        datasets.push({
                            label: label,
                            data: curveData,
                            borderColor: color,
                            borderWidth: isHighlighted ? Math.max(1, lineWidth - 1) * 2 : Math.max(1, lineWidth - 1),
                            borderDash: [5, 5],
                            pointRadius: Math.max(0, pointSize - 2),
                            pointBackgroundColor: color,
                            fill: false,
                            spanGaps: true,
                            tension: 0,
                            hidden: isHidden,
                            isNcCurve: true
                        });
                    }
                }

                // 測定データ
                items.filter(item => item.isVisible).forEach((item, index) => {
                    const label = `${item.legendName} (NC-${item.ncResult})`;
                    
                    const filteredValues = activeFreqs.map(f => {
                        const i = allFreqs.indexOf(f);
                        return item.values[i];
                    });
                    
                    filteredValues.forEach(v => {
                        if (v !== null) maxVal = Math.max(maxVal, v);
                    });
                    
                    const hexColor = dataColors[index % dataColors.length];
                    
                    let isHidden = hiddenLabels.has(label);
                    if (isolatedLabels.size > 0 && !isolatedLabels.has(label)) {
                        isHidden = true; // 単独表示リストになければ非表示
                    }

                    const isHighlighted = highlightedLabels.has(label);
                    const isFaded = highlightedLabels.size > 0 && !isHighlighted;
                    const color = isFaded ? hexToRgba(hexColor, 0.15) : hexColor;

                    datasets.push({
                        label: label,
                        data: filteredValues,
                        borderColor: color,
                        borderWidth: isHighlighted ? lineWidth * 2.5 : lineWidth,
                        pointRadius: isHighlighted ? pointSize * 1.5 : pointSize,
                        pointBackgroundColor: color,
                        fill: false,
                        spanGaps: true,
                        tension: 0,
                        hidden: isHidden,
                        isNcCurve: false
                    });
                });


                if (bgGraphItem) {
                    const bgLabel = `暗騒音 (NC-${bgGraphItem.ncResult})`;
                    const filteredBgValues = activeFreqs.map(f => {
                        const i = allFreqs.indexOf(f);
                        return bgGraphItem.values[i];
                    });

                    filteredBgValues.forEach(v => {
                        if (v !== null) maxVal = Math.max(maxVal, v);
                    });

                    let isHidden = hiddenLabels.has(bgLabel);
                    if (isolatedLabels.size > 0 && !isolatedLabels.has(bgLabel)) {
                        isHidden = true;
                    }

                    const bgColorBase = '#64748b';
                    const isHighlighted = highlightedLabels.has(bgLabel);
                    const isFaded = highlightedLabels.size > 0 && !isHighlighted;
                    const bgColor = isFaded ? hexToRgba(bgColorBase, 0.15) : bgColorBase;

                    datasets.push({
                        label: bgLabel,
                        data: filteredBgValues,
                        borderColor: bgColor,
                        borderWidth: isHighlighted ? lineWidth * 2.5 : lineWidth,
                        borderDash: [2, 3],
                        pointRadius: isHighlighted ? pointSize * 1.5 : pointSize,
                        pointBackgroundColor: bgColor,
                        fill: false,
                        spanGaps: true,
                        tension: 0,
                        hidden: isHidden,
                        isBackgroundNoise: true
                    });
                }

                if (addGraphItem) {
                    const addLabel = `加算音: ${addGraphItem.fileName} (NC-${addGraphItem.ncResult})`;
                    const filteredAddValues = activeFreqs.map(f => {
                        const i = allFreqs.indexOf(f);
                        return addGraphItem.values[i];
                    });

                    filteredAddValues.forEach(v => {
                        if (v !== null) maxVal = Math.max(maxVal, v);
                    });

                    let isHidden = hiddenLabels.has(addLabel);
                    if (isolatedLabels.size > 0 && !isolatedLabels.has(addLabel)) {
                        isHidden = true;
                    }

                    const addColorBase = '#059669';
                    const isHighlighted = highlightedLabels.has(addLabel);
                    const isFaded = highlightedLabels.size > 0 && !isHighlighted;
                    const addColor = isFaded ? hexToRgba(addColorBase, 0.15) : addColorBase;

                    datasets.push({
                        label: addLabel,
                        data: filteredAddValues,
                        borderColor: addColor,
                        borderWidth: isHighlighted ? lineWidth * 2.5 : lineWidth,
                        borderDash: [6, 2],
                        pointRadius: isHighlighted ? pointSize * 1.5 : pointSize,
                        pointBackgroundColor: addColor,
                        fill: false,
                        spanGaps: true,
                        tension: 0,
                        hidden: isHidden,
                        isAddNoise: true
                    });
                }

                const yMax = yAxisMaxAuto ? Math.max(50, Math.ceil((maxVal + 5) / 10) * 10) : yAxisMaxManual;
                setLegendItems(datasets.map(dataset => ({
                    label: dataset.label,
                    color: dataset.borderColor,
                    dash: dataset.borderDash || [],
                    hidden: !!dataset.hidden
                })));

                // chartInstanceを再作成せず、dataとoptionsを更新して描画を維持する
                if (chartInstance.current) {
                    const chart = chartInstance.current;
                    chart.data.labels = activeFreqs.map(getLabelStr);
                    chart.data.datasets = datasets;
                    chart.options.scales.y.max = yMax;
                    chart.options.scales.y.border.width = axisLineWidth;
                    chart.options.scales.x.border.width = axisLineWidth;
                    chart.options.scales.y.title.font.size = axisLabelFontSize;
                    chart.options.scales.x.title.font.size = axisLabelFontSize;
                    chart.options.scales.y.ticks.font.size = tickFontSize;
                    chart.options.scales.x.ticks.font.size = tickFontSize;
                    chart.options.plugins.title.text = groupName;
                    chart.update('none'); // アニメーションなしで即時更新
                } else {
                    const bgPlugin = {
                        id: 'customCanvasBackgroundColor',
                        beforeDraw: (chart) => {
                            const {ctx} = chart;
                            ctx.save();
                            ctx.globalCompositeOperation = 'destination-over';
                            ctx.fillStyle = '#ffffff';
                            ctx.fillRect(0, 0, chart.width, chart.height);
                            ctx.restore();
                        }
                    };

                    chartInstance.current = new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: activeFreqs.map(getLabelStr),
                            datasets: datasets
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            onClick: (e, elements, chart) => {
                                if (elements.length > 0) {
                                    const datasetIndex = elements[0].datasetIndex;
                                    const label = chart.data.datasets[datasetIndex].label;
                                    toggleHighlightedLabel(label);
                                } else {
                                    clearHighlightedLabels();
                                }
                            },
                            scales: {
                                y: {
                                    min: 0,
                                    max: yMax,
                                    title: { display: true, text: '音圧レベル (dB)', font: { size: axisLabelFontSize } },
                                    ticks: { font: { size: tickFontSize } },
                                    border: { width: axisLineWidth },
                                    grid: { color: '#e5e7eb' }
                                },
                                x: {
                                    title: { display: true, text: '周波数帯域 (Hz)', font: { size: axisLabelFontSize } },
                                    ticks: { font: { size: tickFontSize } },
                                    border: { width: axisLineWidth },
                                    grid: { color: '#e5e7eb' }
                                }
                            },
                            plugins: {
                                legend: { 
                                    display: false,
                                    position: 'right',
                                    labels: {
                                        usePointStyle: true,
                                        pointStyle: 'line',
                                        generateLabels: (chart) => {
                                            const labels = Chart.defaults.plugins.legend.labels.generateLabels(chart);
                                            labels.forEach(label => {
                                                label.lineWidth = 8; // 凡例を見やすく太く固定
                                            });
                                            return labels;
                                        }
                                    },
                                    onHover: (e, legendItem, legend) => {
                                        legend.chart.canvas.style.cursor = 'pointer';
                                        hoveredLegendRef.current = legendItem.text;
                                    },
                                    onLeave: (e, legendItem, legend) => {
                                        legend.chart.canvas.style.cursor = 'default';
                                        hoveredLegendRef.current = null;
                                    },
                                    onClick: (e, legendItem, legend) => {
                                        const label = legendItem.text;
                                        const now = Date.now();
                                        
                                        if (now - clickState.current.lastTime < 300) {
                                            clearTimeout(clickState.current.timer);
                                            
                                            // ダブルクリックによる単独表示追加・解除 (State更新)
                                            setIsolatedLabels(prev => {
                                                const next = new Set(prev);
                                                if (next.size === 0) {
                                                    next.add(label);
                                                } else {
                                                    if (next.has(label)) next.delete(label);
                                                    else next.add(label);
                                                }
                                                return next;
                                            });
                                            
                                            clickState.current.lastTime = 0;
                                        } else {
                                            clickState.current.lastTime = now;
                                            clickState.current.timer = setTimeout(() => {
                                                toggleHighlightedLabel(label);
                                            }, 300);
                                        }
                                    }
                                },
                                title: { display: true, text: groupName, font: { size: 16 } }
                            }
                        },
                        plugins: [bgPlugin]
                    });
                }
            }, [items, bgGraphItem, addGraphItem, groupName, visibleNcCurves, lineWidth, pointSize, axisLineWidth, axisLabelFontSize, tickFontSize, yAxisMaxAuto, yAxisMaxManual, highlightedLabels, hiddenLabels, isolatedLabels, isMaximized]);

            const handleContextMenu = (e) => {
                e.preventDefault();
                const label = hoveredLegendRef.current;
                if (label) {
                    setHiddenLabels(prev => {
                        const next = new Set(prev);
                        if (next.has(label)) next.delete(label);
                        else next.add(label);
                        return next;
                    });
                }
            };

            const getExportDimensions = (targetWidth = 1200, fixedHeight = null, fixedScaleBaseWidth = null) => {
                const sourceChart = chartInstance.current;
                const sourceWidth = sourceChart?.width || chartRef.current?.clientWidth || targetWidth;
                const sourceHeight = sourceChart?.height || chartRef.current?.clientHeight || 700;
                const exportWidth = targetWidth;
                const exportHeight = fixedHeight !== null
                    ? Math.max(1, Math.round(fixedHeight))
                    : Math.max(1, Math.round(exportWidth * (sourceHeight / sourceWidth)));
                const exportScale = exportWidth / (fixedScaleBaseWidth || sourceWidth);
                const scaleSize = (value, min = 0) => Math.max(min, Math.round(value * exportScale * 10) / 10);
                return { exportWidth, exportHeight, exportScale, scaleSize };
            };

            const createExportChartCanvas = (targetWidth = 1200, fixedHeight = null, fixedScaleBaseWidth = null) => {
                const sourceChart = chartInstance.current;
                if (!sourceChart) return null;

                const { exportWidth, exportHeight, scaleSize } = getExportDimensions(targetWidth, fixedHeight, fixedScaleBaseWidth);
                const exportCanvas = document.createElement('canvas');
                exportCanvas.width = exportWidth;
                exportCanvas.height = exportHeight;
                const exportCtx = exportCanvas.getContext('2d');
                const exportDatasets = sourceChart.data.datasets.map(dataset => ({
                    ...dataset,
                    data: [...dataset.data],
                    borderWidth: scaleSize(dataset.borderWidth || lineWidth, 1),
                    pointRadius: scaleSize(dataset.pointRadius || 0, 0),
                    borderDash: dataset.borderDash ? dataset.borderDash.map(value => scaleSize(value, 1)) : undefined
                }));

                const bgPlugin = {
                    id: 'exportCanvasBackgroundColor',
                    beforeDraw: (chart) => {
                        const {ctx} = chart;
                        ctx.save();
                        ctx.globalCompositeOperation = 'destination-over';
                        ctx.fillStyle = '#ffffff';
                        ctx.fillRect(0, 0, chart.width, chart.height);
                        ctx.restore();
                    }
                };

                const exportChart = new Chart(exportCtx, {
                    type: 'line',
                    data: {
                        labels: [...sourceChart.data.labels],
                        datasets: exportDatasets
                    },
                    options: {
                        responsive: false,
                        maintainAspectRatio: false,
                        animation: false,
                        scales: {
                            y: {
                                min: 0,
                                max: sourceChart.options.scales.y.max,
                                title: { display: true, text: '音圧レベル (dB)', font: { size: scaleSize(axisLabelFontSize, 1) } },
                                ticks: { font: { size: scaleSize(tickFontSize, 1) } },
                                border: { width: scaleSize(axisLineWidth, 1) },
                                grid: { color: '#e5e7eb' }
                            },
                            x: {
                                title: { display: true, text: '周波数帯域 (Hz)', font: { size: scaleSize(axisLabelFontSize, 1) } },
                                ticks: { font: { size: scaleSize(tickFontSize, 1) } },
                                border: { width: scaleSize(axisLineWidth, 1) },
                                grid: { color: '#e5e7eb' }
                            }
                        },
                        plugins: {
                            legend: { display: false },
                            title: { display: true, text: groupName, font: { size: scaleSize(16, 1) } }
                        }
                    },
                    plugins: [bgPlugin]
                });

                exportChart.update('none');
                return { canvas: exportCanvas, chart: exportChart };
            };

            const getLegendLayout = (ctx, width, scale, columns = 1, fixedHeight = null, fontSize = 12 * scale) => {
                const columnCount = Math.max(1, columns);
                const padding = 8 * scale;
                const columnGap = 8 * scale;
                const lineHeight = fontSize * 1.15;
                const itemGap = 2 * scale;
                const markerWidth = 18 * scale;
                const markerLineWidth = Math.max(1, fontSize * 0.16);
                const columnWidth = (width - padding * 2 - columnGap * (columnCount - 1)) / columnCount;
                const textOffset = markerWidth + 4 * scale;
                ctx.font = `${fontSize}px sans-serif`;

                const rows = legendItems.map(item => ({
                    item,
                    lines: [item.label],
                    height: lineHeight + itemGap,
                    width: ctx.measureText(item.label).width + textOffset
                }));

                const requiredColumnWidth = Math.max(columnWidth, ...rows.map(row => row.width));
                const columnsData = Array.from({ length: columnCount }, () => ({ rows: [], height: padding }));
                const maxColumnHeight = fixedHeight ? Math.max(padding, fixedHeight - padding) : null;
                const rowsPerColumn = fixedHeight ? Infinity : Math.ceil(rows.length / columnCount);
                let targetColumn = 0;

                rows.forEach(row => {
                    const column = columnsData[targetColumn];
                    const shouldMoveByHeight = maxColumnHeight !== null && column.rows.length > 0 && column.height + row.height > maxColumnHeight;
                    const shouldMoveByCount = maxColumnHeight === null && column.rows.length >= rowsPerColumn;
                    if ((shouldMoveByHeight || shouldMoveByCount) && targetColumn < columnCount - 1) {
                        targetColumn += 1;
                    }
                    columnsData[targetColumn].rows.push(row);
                    columnsData[targetColumn].height += row.height;
                });

                const contentHeight = Math.max(...columnsData.map(column => column.height), padding);
                const height = Math.max(1, contentHeight + padding);
                return { columnsData, height, padding, columnGap, columnWidth, requiredColumnWidth, lineHeight, itemGap, markerWidth, markerLineWidth, textOffset, fontSize };
            };

            const drawLegend = (ctx, x, y, width, scale, columns = 1, fixedHeight = null, fontSize = 12 * scale) => {
                const layout = getLegendLayout(ctx, width, scale, columns, fixedHeight, fontSize);
                const canvasHeight = fixedHeight || layout.height;
                ctx.save();
                ctx.translate(x, y);
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, width, canvasHeight);
                ctx.font = `${fontSize}px sans-serif`;
                ctx.textBaseline = 'top';
                layout.columnsData.forEach((column, columnIndex) => {
                    const columnX = layout.padding + columnIndex * (layout.requiredColumnWidth + layout.columnGap);
                    let cursorY = layout.padding;
                    column.rows.forEach(({ item, lines }) => {
                        const markerY = cursorY + fontSize * 0.55;
                        ctx.save();
                        ctx.globalAlpha = item.hidden ? 0.35 : 1;
                        ctx.strokeStyle = item.color || '#64748b';
                        ctx.lineWidth = layout.markerLineWidth;
                        ctx.setLineDash((item.dash || []).map(value => value * scale));
                        ctx.beginPath();
                        ctx.moveTo(columnX, markerY);
                        ctx.lineTo(columnX + layout.markerWidth, markerY);
                        ctx.stroke();
                        ctx.setLineDash([]);
                        ctx.fillStyle = '#374151';
                        lines.forEach((line, index) => {
                            ctx.fillText(line, columnX + layout.textOffset, cursorY + index * layout.lineHeight);
                        });
                        ctx.restore();
                        cursorY += lines.length * layout.lineHeight + layout.itemGap;
                    });
                });
                ctx.restore();
                return layout.height;
            };

            const createLegendCanvas = (columnWidth = 260, scale = 2, columns = 1, fixedHeight = null, fontSize = 12 * scale) => {
                const columnCount = Math.max(1, columns);
                const measureCanvas = document.createElement('canvas');
                const measureCtx = measureCanvas.getContext('2d');
                const basePadding = 8 * scale;
                const baseColumnGap = 8 * scale;
                const initialWidth = basePadding * 2 + columnWidth * columnCount + baseColumnGap * (columnCount - 1);
                const initialLayout = getLegendLayout(measureCtx, initialWidth, scale, columnCount, fixedHeight, fontSize);
                const adjustedColumnWidth = Math.max(columnWidth, Math.ceil(initialLayout.requiredColumnWidth));
                const width = Math.ceil(initialLayout.padding * 2 + adjustedColumnWidth * columnCount + initialLayout.columnGap * (columnCount - 1));
                const layout = getLegendLayout(measureCtx, width, scale, columnCount, fixedHeight, fontSize);
                const canvas = document.createElement('canvas');
                canvas.width = width;
                canvas.height = Math.ceil(fixedHeight || layout.height);
                const ctx = canvas.getContext('2d');
                drawLegend(ctx, 0, 0, width, scale, columnCount, fixedHeight, fontSize);
                return canvas;
            };

            const getLegendColumnsForHeight = (columnWidth, scale, targetHeight, maxColumns = 8, fontSize = 12 * scale) => {
                const measureCanvas = document.createElement('canvas');
                const measureCtx = measureCanvas.getContext('2d');
                for (let columns = 1; columns <= maxColumns; columns++) {
                    const width = 8 * scale * 2 + columnWidth * columns + 8 * scale * (columns - 1);
                    const layout = getLegendLayout(measureCtx, width, scale, columns, targetHeight, fontSize);
                    if (layout.height <= targetHeight) return columns;
                }
                return maxColumns;
            };

            const copyCanvasToClipboard = (canvas, cleanup = null) => {
                if (!canvas) return;
                canvas.toBlob(async (blob) => {
                    try {
                        const clipboardItem = new window.ClipboardItem({ "image/png": blob });
                        await navigator.clipboard.write([clipboardItem]);
                    } catch (err) {
                        alert("コピーに失敗しました。グラフを右クリックして「画像をコピー」を選択してください。");
                    } finally {
                        if (cleanup) cleanup();
                    }
                });
            };

            const addAspectRatioPadding = (sourceCanvas, targetAspectRatio) => {
                const sourceAspectRatio = sourceCanvas.width / sourceCanvas.height;
                const outputCanvas = document.createElement('canvas');
                if (sourceAspectRatio > targetAspectRatio) {
                    outputCanvas.width = sourceCanvas.width;
                    outputCanvas.height = Math.ceil(sourceCanvas.width / targetAspectRatio);
                } else {
                    outputCanvas.width = Math.ceil(sourceCanvas.height * targetAspectRatio);
                    outputCanvas.height = sourceCanvas.height;
                }
                const ctx = outputCanvas.getContext('2d');
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, outputCanvas.width, outputCanvas.height);
                ctx.drawImage(sourceCanvas, 0, 0);
                return outputCanvas;
            };

            const handleCopyGraphImage = () => {
                const chartWidth = useFixedCopyAspectRatio ? 1537 : 1200;
                const fixedHeight = useFixedCopyAspectRatio ? Math.round(chartWidth / CHART_COPY_ASPECT_RATIO) : null;
                const exportResult = createExportChartCanvas(chartWidth, fixedHeight, useFixedCopyAspectRatio ? FIXED_COPY_SCALE_BASE_WIDTH : null);
                if (!exportResult) return;
                const copyCanvas = useFixedCopyAspectRatio ? addAspectRatioPadding(exportResult.canvas, ATTACHED_COPY_ASPECT_RATIO) : exportResult.canvas;
                copyCanvasToClipboard(copyCanvas, () => exportResult.chart.destroy());
            };

            const handleCopyLegendImage = (columns = legendCopyColumns) => {
                copyCanvasToClipboard(createLegendCanvas(260, 2, columns, null, copyLegendFontSize * 2));
                setShowLegendCopyModal(false);
            };

            const handleCopyCombinedImage = () => {
                const chartWidth = useFixedCopyAspectRatio ? 1537 : 880;
                const legendColumnWidth = 220;
                const legendScale = 2;
                const padding = 24;
                const fixedChartHeight = useFixedCopyAspectRatio ? Math.round(chartWidth / CHART_COPY_ASPECT_RATIO) : null;
                const chartResult = createExportChartCanvas(chartWidth, fixedChartHeight, useFixedCopyAspectRatio ? FIXED_COPY_SCALE_BASE_WIDTH : null);
                if (!chartResult) return;
                const chartCanvas = chartResult.canvas;
                const legendFontSize = getExportDimensions(chartWidth, fixedChartHeight, useFixedCopyAspectRatio ? FIXED_COPY_SCALE_BASE_WIDTH : null).scaleSize(copyLegendFontSize, 1);
                const legendColumns = getLegendColumnsForHeight(legendColumnWidth, legendScale, chartCanvas.height, 8, legendFontSize);
                const legendCanvas = createLegendCanvas(legendColumnWidth, legendScale, legendColumns, chartCanvas.height, legendFontSize);
                const combinedCanvas = document.createElement('canvas');
                combinedCanvas.width = chartCanvas.width + legendCanvas.width + padding;
                combinedCanvas.height = chartCanvas.height;
                const ctx = combinedCanvas.getContext('2d');
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, combinedCanvas.width, combinedCanvas.height);
                ctx.drawImage(chartCanvas, 0, 0);
                ctx.drawImage(legendCanvas, chartCanvas.width + padding, 0);
                copyCanvasToClipboard(combinedCanvas, () => chartResult.chart.destroy());
            };

            const handleLegendClick = (label) => {
                const now = Date.now();
                if (now - clickState.current.lastTime < 300) {
                    clearTimeout(clickState.current.timer);
                    setIsolatedLabels(prev => {
                        const next = new Set(prev);
                        if (next.size === 0) next.add(label);
                        else if (next.has(label)) next.delete(label);
                        else next.add(label);
                        return next;
                    });
                    clickState.current.lastTime = 0;
                } else {
                    clickState.current.lastTime = now;
                    clickState.current.timer = setTimeout(() => {
                        toggleHighlightedLabel(label);
                    }, 300);
                }
            };

            const handleLegendContextMenu = (e, label) => {
                e.preventDefault();
                setHiddenLabels(prev => {
                    const next = new Set(prev);
                    if (next.has(label)) next.delete(label);
                    else next.add(label);
                    return next;
                });
            };

            const containerClass = isMaximized 
                ? "fixed inset-4 z-[100] bg-white p-6 rounded-xl shadow-2xl border border-gray-300 flex flex-col" 
                : `bg-white p-4 rounded-xl shadow-sm border border-gray-200 flex flex-col h-[500px] transition-opacity ${isDraggingThis ? 'dragging' : ''}`; 
            
            const canvasWrapperClass = "flex-grow min-h-0 relative mt-2";

            const modalColumns = isViewerMode 
                ? [ { id: 'legendName', title: '凡例名', readOnly: false }, { id: 'ncResult', title: '判定', readOnly: true } ]
                : [
                    { id: 'fileName', title: 'ファイル名', readOnly: true },
                    { id: 'legendName', title: '凡例名', readOnly: false },
                    { id: 'ncResult', title: '判定', readOnly: true }
                  ];

            return (
                <div 
                    className={containerClass}
                    draggable={isDraggable && !isMaximized && isViewerMode}
                    onDragStart={!isMaximized && isViewerMode ? onDragStart : undefined}
                    onDragOver={!isMaximized && isViewerMode ? onDragOver : undefined}
                    onDrop={!isMaximized && isViewerMode ? onDrop : undefined}
                >
                    <div className="flex flex-col items-start shrink-0 gap-2">
                        <h3 className="font-bold text-gray-700 text-lg flex items-center min-w-0 w-full">
                            {(!isMaximized && isViewerMode) && (
                                <span
                                    className="drag-handle mr-2 text-gray-400 hover:text-gray-600 bg-gray-100 hover:bg-gray-200 rounded p-1 cursor-grab flex items-center justify-center transition-colors shrink-0"
                                    title="ドラッグして並べ替え"
                                    onMouseEnter={() => setIsDraggable(true)}
                                    onMouseLeave={() => setIsDraggable(false)}
                                    onMouseDown={() => setIsDraggable(true)}
                                    onMouseUp={() => setIsDraggable(false)}
                                >
                                    <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 8h16M4 16h16"></path></svg>
                                </span>
                            )}
                            <span className="truncate" title={groupName}>{groupName}</span>
                            {projectName && <span className="ml-2 text-[10px] font-semibold text-purple-700 bg-purple-50 border border-purple-200 rounded px-1.5 py-0.5 shrink-0">{projectName}</span>}
                        </h3>
                        <div className="flex items-center space-x-2">
                            <button onClick={() => setShowDataModal(true)} className="text-sm bg-indigo-50 hover:bg-indigo-100 text-indigo-700 w-8 h-8 rounded shadow-sm border border-indigo-200 font-bold flex items-center justify-center" title="データ設定" aria-label="データ設定">
                                ⚙️
                            </button>
                            <button onClick={handleCopyGraphImage} className="text-sm bg-gray-100 hover:bg-gray-200 text-gray-700 w-8 h-8 rounded shadow-sm border border-gray-300 flex items-center justify-center" title="グラフ単体をコピー" aria-label="グラフ単体をコピー">
                                📈
                            </button>
                            <button onClick={() => setShowLegendCopyModal(true)} className="text-sm bg-gray-100 hover:bg-gray-200 text-gray-700 w-8 h-8 rounded shadow-sm border border-gray-300 flex items-center justify-center" title="凡例単体をコピー" aria-label="凡例単体をコピー">
                                🏷️
                            </button>
                            <button onClick={handleCopyCombinedImage} className="text-sm bg-gray-100 hover:bg-gray-200 text-gray-700 w-8 h-8 rounded shadow-sm border border-gray-300 flex items-center justify-center" title="グラフと凡例を一体でコピー" aria-label="グラフと凡例を一体でコピー">
                                🖼️
                            </button>
                            <button onClick={() => setIsMaximized(!isMaximized)} className="text-sm bg-blue-50 hover:bg-blue-100 text-blue-700 w-8 h-8 rounded shadow-sm border border-blue-200 font-bold flex items-center justify-center" title={isMaximized ? "縮小" : "最大化"} aria-label={isMaximized ? "縮小" : "最大化"}>
                                {isMaximized ? "🗕" : "⛶"}
                            </button>
                        </div>
                    </div>
                    <div className={canvasWrapperClass}>
                        <div className="absolute inset-0 flex min-h-0 gap-3">
                            <div className="flex-grow min-w-0 relative">
                                <canvas ref={chartRef} onContextMenu={handleContextMenu}></canvas>
                            </div>
                            <div className="w-44 lg:w-56 shrink-0 overflow-y-auto border-l border-gray-200 pl-2 pr-1 text-xs bg-white" title="凡例（スクロール可能）">
                                {legendItems.map(item => (
                                    <div
                                        key={item.label}
                                        className={`flex items-start gap-2 py-1 cursor-pointer rounded px-1 hover:bg-gray-50 ${highlightedLabels.has(item.label) ? 'bg-yellow-50 ring-1 ring-yellow-300' : ''} ${item.hidden ? 'opacity-40' : ''}`}
                                        onClick={() => handleLegendClick(item.label)}
                                        onContextMenu={(e) => handleLegendContextMenu(e, item.label)}
                                        title={item.label}
                                    >
                                        <span className="mt-2 inline-block w-6 border-t-2 shrink-0" style={{ borderColor: item.color, borderStyle: item.dash.length ? 'dashed' : 'solid' }}></span>
                                        <span className="break-words leading-snug">{item.label}</span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>

                    {showLegendCopyModal && (
                        <div className="fixed inset-0 z-[210] bg-black bg-opacity-40 flex items-center justify-center p-4">
                            <div className="bg-white rounded-xl shadow-2xl w-[360px] max-w-full overflow-hidden">
                                <div className="p-4 border-b bg-gray-50 flex justify-between items-center">
                                    <h3 className="font-bold text-gray-700">凡例コピーの段数</h3>
                                    <button onClick={() => setShowLegendCopyModal(false)} className="text-gray-500 hover:text-gray-800 text-xl font-bold">&times;</button>
                                </div>
                                <div className="p-4 space-y-3">
                                    <p className="text-xs text-gray-500">凡例単体を画像コピーするときの段数を選択してください。</p>
                                    <div className="grid grid-cols-3 gap-2">
                                        {[1, 2, 3, 4, 5, 6].map(count => (
                                            <button
                                                key={count}
                                                onClick={() => setLegendCopyColumns(count)}
                                                className={`px-3 py-2 rounded-lg border text-sm font-bold ${legendCopyColumns === count ? 'bg-blue-100 border-blue-400 text-blue-700' : 'bg-white border-gray-300 text-gray-700 hover:bg-gray-50'}`}
                                            >
                                                {count}段
                                            </button>
                                        ))}
                                    </div>
                                </div>
                                <div className="p-3 border-t bg-gray-50 flex justify-end gap-2">
                                    <button onClick={() => setShowLegendCopyModal(false)} className="px-4 py-1.5 rounded border border-gray-300 bg-white hover:bg-gray-50 text-gray-700 font-bold">キャンセル</button>
                                    <button onClick={() => handleCopyLegendImage(legendCopyColumns)} className="px-4 py-1.5 rounded bg-blue-600 hover:bg-blue-700 text-white font-bold">コピー</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {showDataModal && (
                        <div className="fixed inset-0 z-[200] bg-black bg-opacity-40 flex items-center justify-center p-4">
                            <div className="bg-white rounded-xl shadow-2xl w-[800px] h-[80vh] max-w-full flex flex-col overflow-hidden">
                                <div className="p-4 border-b flex justify-between items-center bg-gray-50 shrink-0">
                                    <h3 className="font-bold text-lg text-gray-700">【{groupName}】 データ選択・設定</h3>
                                    <button onClick={() => setShowDataModal(false)} className="text-gray-500 hover:text-gray-800 text-xl font-bold">&times;</button>
                                </div>
                                <div className="p-4 flex-grow min-h-0 flex flex-col">
                                     <p className="text-[10px] text-gray-500 mb-2 leading-tight shrink-0">
                                        複数セルをドラッグ（またはCtrl/Shift押下）選択し、Ctrl+C/Vで一括コピペ。<br/>
                                        表示チェックボックスや上下移動も、複数選択状態で一括操作できます。
                                    </p>
                                    <div className="flex-grow relative border border-gray-300 rounded shadow-inner">
                                        <div className="absolute inset-0">
                                            <DataTable 
                                                displayItems={items} 
                                                groups={groups} 
                                                columns={modalColumns}
                                                setGroups={setGroups} 
                                                projects={projects}
                                                groupProjects={groupProjects}
                                                setDataItems={setDataItems} 
                                                onRemoveItem={isExportedViewerMode ? undefined : onRemoveItem} 
                                                onToggleVisible={onToggleVisible} 
                                                onMoveItems={onMoveItems} 
                                            />
                                        </div>
                                    </div>
                                </div>
                                <div className="p-3 border-t bg-gray-50 flex justify-between items-center gap-3 shrink-0 flex-wrap">
                                    <div className="flex items-center gap-2 text-xs">
                                        <span className="font-bold text-gray-600">プロジェクト操作:</span>
                                        <select
                                            value={targetProjectForGroup}
                                            onChange={(e) => setTargetProjectForGroup(e.target.value)}
                                            className="px-2 py-1 border border-gray-300 rounded bg-white min-w-[160px]"
                                        >
                                            {projects?.map(p => <option key={p} value={p}>{p}</option>)}
                                        </select>
                                        {onMoveGroupToProject && (
                                            <button onClick={() => onMoveGroupToProject(groupName, targetProjectForGroup)} className="px-3 py-1 bg-purple-100 hover:bg-purple-200 text-purple-700 font-bold rounded border border-purple-200">
                                                移動
                                            </button>
                                        )}
                                        {onDuplicateGroup && (
                                            <button onClick={() => onDuplicateGroup(groupName, targetProjectForGroup)} className="px-3 py-1 bg-indigo-100 hover:bg-indigo-200 text-indigo-700 font-bold rounded border border-indigo-200">
                                                コピー
                                            </button>
                                        )}
                                    </div>
                                    <button onClick={() => setShowDataModal(false)} className="px-6 py-1.5 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-lg shadow-sm">
                                        閉じる
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // --- スプレッドシート型編集コンポーネント ---
        const DataTable = ({ displayItems, groups, projects, groupProjects, columns, setDataItems, setGroups, onRemoveItem, onToggleVisible, onMoveItems }) => {
            const [selectedCells, setSelectedCells] = React.useState(new Set());
            const [activeCell, setActiveCell] = React.useState(null);
            const [isDragging, setIsDragging] = React.useState(false);
            const [editingCell, setEditingCell] = React.useState(null);
            const [contextMenu, setContextMenu] = React.useState(null);
            const [detailItem, setDetailItem] = React.useState(null);
            const [detailDraftValues, setDetailDraftValues] = React.useState({});
            const tableContainerRef = React.useRef(null);

            const getDetailRows = (item) => {
                if (!item) return [];
                const activeFreqs = item.appliedOctMode === '1/3' ? allFreqs : targetOctFreqs;
                const resultText = String(item.ncResult ?? '');
                const numericNc = resultText === '>70' ? 70 : (resultText === '<15' ? 15 : Number(resultText));
                return activeFreqs.map(freq => {
                    const idx = allFreqs.indexOf(freq);
                    const value = item.values?.[idx];
                    const referenceValue = Number.isFinite(numericNc) ? getNcCurveInterpolated(numericNc, [freq])[0] : null;
                    const requiredNc = getRequiredNcForFrequency(freq, value);
                    const isCause = resultText === '>70'
                        ? requiredNc === '>70'
                        : Number.isFinite(Number(resultText)) && requiredNc === Number(resultText);
                    return { freq, value, referenceValue, requiredNc, isCause };
                });
            };

            const formatDetailValue = (value) => (value === null || value === undefined || isNaN(value) ? '-' : Math.round(value * 10) / 10);

            const updateDetailOctaveValue = (targetItem, freq, inputValue, shouldRound = false) => {
                const trimmed = inputValue.trim();
                const parsedValue = trimmed === '' ? null : Number(trimmed);
                if (trimmed !== '' && !Number.isFinite(parsedValue)) return false;

                const idx = allFreqs.indexOf(freq);
                if (idx === -1) return false;

                const nextValue = parsedValue === null
                    ? null
                    : (shouldRound ? Math.round(parsedValue * 10) / 10 : parsedValue);
                const applyUpdate = (orig) => {
                    const nextValues = [...(orig.values || new Array(allFreqs.length).fill(null))];
                    nextValues[idx] = nextValue;
                    return {
                        ...orig,
                        values: nextValues,
                        ncResult: calculateNC(nextValues)
                    };
                };

                setDataItems(prev => prev.map(orig => orig.id === targetItem.id ? applyUpdate(orig) : orig));
                setDetailItem(prev => prev && prev.id === targetItem.id ? applyUpdate(prev) : prev);
                return true;
            };

            const handleDetailValueInput = (targetItem, freq, inputValue) => {
                const key = `${targetItem.id}-${freq}`;
                setDetailDraftValues(prev => ({ ...prev, [key]: inputValue }));
                updateDetailOctaveValue(targetItem, freq, inputValue);
            };

            const handleDetailValueCommit = (targetItem, freq, inputValue) => {
                const key = `${targetItem.id}-${freq}`;
                if (updateDetailOctaveValue(targetItem, freq, inputValue, true)) {
                    setDetailDraftValues(prev => {
                        const next = { ...prev };
                        delete next[key];
                        return next;
                    });
                }
            };

            const getSelectedRowIndices = () => {
                const rows = new Set();
                selectedCells.forEach(key => rows.add(parseInt(key.split('-')[0])));
                return Array.from(rows).sort((a,b)=>a-b);
            };

            React.useEffect(() => {
                const handleClickOutside = (e) => {
                    if (tableContainerRef.current && !tableContainerRef.current.contains(e.target)) {
                        setSelectedCells(new Set());
                        setActiveCell(null);
                        setEditingCell(null);
                        setContextMenu(null);
                    }
                };
                const handleMouseUp = () => setIsDragging(false);
                
                window.addEventListener('mousedown', handleClickOutside);
                window.addEventListener('mouseup', handleMouseUp);
                return () => {
                    window.removeEventListener('mousedown', handleClickOutside);
                    window.removeEventListener('mouseup', handleMouseUp);
                };
            }, []);

            const handleMouseDown = (e, r, c) => {
                if (e.button !== 0) return; 
                if (editingCell && editingCell.r === r && editingCell.c === c) return;
                
                setContextMenu(null);
                setEditingCell(null);

                if (e.ctrlKey || e.metaKey) {
                    const newSet = new Set(selectedCells);
                    const key = `${r}-${c}`;
                    if (newSet.has(key)) newSet.delete(key);
                    else newSet.add(key);
                    setSelectedCells(newSet);
                    setActiveCell({r, c});
                } else if (e.shiftKey && activeCell) {
                    const newSet = new Set(selectedCells);
                    const minR = Math.min(activeCell.r, r);
                    const maxR = Math.max(activeCell.r, r);
                    const minC = Math.min(activeCell.c, c);
                    const maxC = Math.max(activeCell.c, c);
                    for(let i=minR; i<=maxR; i++) {
                        for(let j=minC; j<=maxC; j++) {
                            newSet.add(`${i}-${j}`);
                        }
                    }
                    setSelectedCells(newSet);
                } else {
                    setSelectedCells(new Set([`${r}-${c}`]));
                    setActiveCell({r, c});
                    setIsDragging(true);
                }
            };

            const handleMouseEnter = (r, c) => {
                if (!isDragging || !activeCell) return;
                const newSet = new Set();
                const minR = Math.min(activeCell.r, r);
                const maxR = Math.max(activeCell.r, r);
                const minC = Math.min(activeCell.c, c);
                const maxC = Math.max(activeCell.c, c);
                for(let i=minR; i<=maxR; i++) {
                    for(let j=minC; j<=maxC; j++) {
                        newSet.add(`${i}-${j}`);
                    }
                }
                setSelectedCells(newSet);
            };

            const handleDoubleClick = (r, c) => {
                if (!columns[c].readOnly) {
                    setContextMenu(null);
                    // 選択範囲に含まれていなければ、そのセルだけ選択する
                    if (!selectedCells.has(`${r}-${c}`)) {
                        setSelectedCells(new Set([`${r}-${c}`]));
                        setActiveCell({r, c});
                    }
                    setEditingCell({ r, c });
                }
            };

            const handleTableContextMenu = (e) => {
                e.preventDefault();
                if (selectedCells.size > 0 && columns.some(c => c.id === 'groupName')) {
                    setContextMenu({ x: e.clientX, y: e.clientY });
                }
            };

            React.useEffect(() => {
                const handleKeyDown = (e) => {
                    if (editingCell || contextMenu) return;
                    if (selectedCells.size === 0) return;

                    let minR = Infinity, maxR = -Infinity, minC = Infinity, maxC = -Infinity;
                    selectedCells.forEach(key => {
                        const [rStr, cStr] = key.split('-');
                        const r = parseInt(rStr);
                        const c = parseInt(cStr);
                        minR = Math.min(minR, r); maxR = Math.max(maxR, r);
                        minC = Math.min(minC, c); maxC = Math.max(maxC, c);
                    });

                    // コピー (Ctrl+C)
                    if ((e.ctrlKey || e.metaKey) && (e.key === 'c' || e.key === 'C')) {
                        e.preventDefault();
                        let copyText = '';
                        for (let r = minR; r <= maxR; r++) {
                            let rowText = [];
                            for (let c = minC; c <= maxC; c++) {
                                if (selectedCells.has(`${r}-${c}`)) {
                                    let val = displayItems[r][columns[c].id] || '';
                                    if (columns[c].id === 'ncResult') val = `NC-${val}`;
                                    rowText.push(val);
                                } else {
                                    rowText.push('');
                                }
                            }
                            copyText += rowText.join('\t') + '\n';
                        }
                        navigator.clipboard.writeText(copyText);
                    } 
                    // クリア (Delete or Backspace)
                    else if (e.key === 'Delete' || e.key === 'Backspace') {
                        e.preventDefault();
                        const updates = {};
                        selectedCells.forEach(key => {
                            const [rStr, cStr] = key.split('-');
                            const r = parseInt(rStr);
                            const c = parseInt(cStr);
                            if (!columns[c].readOnly) {
                                const targetItem = displayItems[r];
                                if (!updates[targetItem.id]) updates[targetItem.id] = { ...targetItem };
                                updates[targetItem.id][columns[c].id] = "";
                            }
                        });
                        if (Object.keys(updates).length > 0) {
                            setDataItems(prev => prev.map(item => updates[item.id] ? { ...item, ...updates[item.id] } : item));
                        }
                    }
                };

                const handlePaste = (e) => {
                    if (editingCell || contextMenu || selectedCells.size === 0) return;
                    e.preventDefault();

                    const pasteData = (e.clipboardData || window.clipboardData).getData('text');
                    if (!pasteData) return;

                    const rows = pasteData.split(/\r?\n/).filter(r => r !== '');
                    let minR = Infinity, minC = Infinity;
                    selectedCells.forEach(key => {
                        const [rStr, cStr] = key.split('-');
                        const r = parseInt(rStr);
                        const c = parseInt(cStr);
                        minR = Math.min(minR, r);
                        minC = Math.min(minC, c);
                    });

                    const updates = {};
                    const newGroupsToAdd = [];

                    for (let i = 0; i < rows.length; i++) {
                        const targetR = minR + i;
                        if (targetR >= displayItems.length) break;

                        const cells = rows[i].split('\t');
                        const targetItem = displayItems[targetR];
                        if (!updates[targetItem.id]) updates[targetItem.id] = { ...targetItem };

                        for (let j = 0; j < cells.length; j++) {
                            const targetC = minC + j;
                            if (targetC >= columns.length) break;

                            const col = columns[targetC];
                            if (col.readOnly) continue;

                            const val = cells[j].trim();
                            if (val) {
                                updates[targetItem.id][col.id] = val;
                                if (col.id === 'groupName' && !groups.includes(val) && !newGroupsToAdd.includes(val)) {
                                    newGroupsToAdd.push(val);
                                }
                            }
                        }
                    }

                    if (Object.keys(updates).length > 0) {
                        setDataItems(prev => prev.map(item => updates[item.id] ? { ...item, ...updates[item.id] } : item));
                    }
                    if (newGroupsToAdd.length > 0) {
                        setGroups(prev => [...prev, ...newGroupsToAdd]);
                    }
                };

                window.addEventListener('keydown', handleKeyDown);
                window.addEventListener('paste', handlePaste);
                return () => {
                    window.removeEventListener('keydown', handleKeyDown);
                    window.removeEventListener('paste', handlePaste);
                };
            }, [selectedCells, editingCell, contextMenu, displayItems, groups, setDataItems, setGroups, columns]);

            const handleKeyDownInEdit = (e, rIndex, cIndex) => {
                if (e.key === 'Enter' || (!e.shiftKey && e.key === 'Tab')) {
                    e.preventDefault();
                    e.target.blur();
                    
                    let nextR = rIndex + 1;
                    let nextC = cIndex; 
                    
                    if (nextR < displayItems.length) {
                        setEditingCell({ r: nextR, c: nextC });
                        setSelectedCells(new Set([`${nextR}-${nextC}`]));
                        setActiveCell({ r: nextR, c: nextC });
                    } else {
                        setEditingCell(null);
                    }
                } else if (e.shiftKey && e.key === 'Tab') {
                    e.preventDefault();
                    e.target.blur(); 
                    
                    let nextR = rIndex - 1;
                    let nextC = cIndex;

                    if (nextR >= 0) {
                        setEditingCell({ r: nextR, c: nextC });
                        setSelectedCells(new Set([`${nextR}-${nextC}`]));
                        setActiveCell({ r: nextR, c: nextC });
                    } else {
                        setEditingCell(null);
                    }
                } else if (e.key === 'Escape') {
                    e.preventDefault();
                    setEditingCell(null);
                }
            };

            const handleCheckboxChange = (item, rIndex) => {
                const rows = getSelectedRowIndices();
                const targetState = !item.isVisible;
                if (rows.includes(rIndex)) {
                    const ids = rows.map(r => displayItems[r].id);
                    onToggleVisible(ids, targetState);
                } else {
                    onToggleVisible([item.id], targetState);
                }
            };

            const handleRemoveSelectedRows = () => {
                if (!onRemoveItem) return;
                const rows = getSelectedRowIndices();
                if (rows.length === 0) return;
                onRemoveItem(rows.map(r => displayItems[r].id));
                setSelectedCells(new Set());
                setActiveCell(null);
            };

            const handleRemoveRow = (item, rIndex) => {
                if (!onRemoveItem) return;
                const rows = getSelectedRowIndices();
                if (rows.includes(rIndex)) {
                    onRemoveItem(rows.map(r => displayItems[r].id));
                    setSelectedCells(new Set());
                    setActiveCell(null);
                } else {
                    onRemoveItem(item.id);
                }
            };

            const handleMoveSelectedRows = (direction) => {
                const rows = getSelectedRowIndices();
                if (rows.length === 0) return;
                
                if (direction === 'up' && rows[0] === 0) return;
                if (direction === 'down' && rows[rows.length - 1] === displayItems.length - 1) return;
                
                const selectedIds = rows.map(r => displayItems[r].id);
                onMoveItems(selectedIds, direction, displayItems.map(item => item.id));
                
                const offset = direction === 'up' ? -1 : 1;
                const newSet = new Set();
                selectedCells.forEach(key => {
                    const [rStr, cStr] = key.split('-');
                    newSet.add(`${parseInt(rStr) + offset}-${cStr}`);
                });
                setSelectedCells(newSet);
                if (activeCell) setActiveCell({ r: activeCell.r + offset, c: activeCell.c });
            };

            const renderCell = (item, rIndex, cIndex) => {
                const col = columns[cIndex];
                const isEditing = editingCell?.r === rIndex && editingCell?.c === cIndex;
                const isSelected = selectedCells.has(`${rIndex}-${cIndex}`);

                const baseClass = `px-3 py-1.5 border-l border-gray-300 text-sm truncate relative cursor-cell min-w-[120px] select-none ${!item.isVisible ? 'opacity-50 line-through' : ''}`;
                const selectedClass = isSelected ? "bg-blue-100 shadow-[inset_0_0_0_2px_#3b82f6] z-10" : "bg-transparent";
                const cellClass = `${baseClass} ${selectedClass}`;

                if (isEditing) {
                    if (col.isSelect) {
                        return (
                            <td key={cIndex} className="p-0 border-l border-gray-300 relative bg-white shadow-[inset_0_0_0_2px_#3b82f6] z-20 min-w-[120px]">
                                <select 
                                    defaultValue={item[col.id]}
                                    autoFocus
                                    onChange={(e) => {
                                        const val = e.target.value;
                                        const rows = getSelectedRowIndices();
                                        if (rows.includes(rIndex)) {
                                            const ids = rows.map(r => displayItems[r].id);
                                            setDataItems(prev => prev.map(orig => ids.includes(orig.id) ? { ...orig, [col.id]: val } : orig));
                                        } else {
                                            setDataItems(prev => prev.map(orig => orig.id === item.id ? { ...orig, [col.id]: val } : orig));
                                        }
                                        setEditingCell(null);
                                    }}
                                    onBlur={() => setEditingCell(null)}
                                    className="w-full h-full min-h-[30px] px-2 border-none focus:outline-none bg-white text-sm cursor-pointer"
                                >
                                    {(col.id === 'projectName' ? projects : groups).map(g => <option key={g} value={g}>{g}</option>)}
