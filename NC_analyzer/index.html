                                </select>
                            </td>
                        );
                    } else {
                        return (
                            <td key={cIndex} className="p-0 border-l border-gray-300 relative bg-white shadow-[inset_0_0_0_2px_#3b82f6] z-20 min-w-[120px]">
                                <input 
                                    type="text" 
                                    defaultValue={item[col.id]}
                                    autoFocus
                                    list={col.id === 'groupName' ? "group-list" : undefined}
                                    onChange={(e) => {
                                        const val = e.target.value;
                                        setDataItems(prev => prev.map(orig => orig.id === item.id ? { ...orig, [col.id]: val } : orig));
                                    }}
                                    onBlur={(e) => {
                                        if(col.id === 'groupName') {
                                            const val = e.target.value.trim();
                                            if (val && !groups.includes(val)) setGroups(prev => [...prev, val]);
                                        }
                                        setEditingCell(null);
                                    }}
                                    onKeyDown={(e) => handleKeyDownInEdit(e, rIndex, cIndex)}
                                    className="w-full h-full min-h-[30px] px-3 border-none focus:outline-none bg-white text-sm"
                                />
                            </td>
                        );
                    }
                }

                if (col.id === 'fileName') {
                    return (
                        <td key={cIndex} className={cellClass} onMouseDown={(e) => handleMouseDown(e, rIndex, cIndex)} onMouseEnter={() => handleMouseEnter(rIndex, cIndex)}>
                            <button
                                type="button"
                                onClick={(e) => { e.stopPropagation(); setDetailItem(item); }}
                                className="flex items-center space-x-1 w-full text-left hover:text-blue-700 hover:underline"
                                title={`${item.fileName} のオクターブ分析結果を表示`}
                            >
                                <span className="truncate">{item.fileName}</span>
                                {item.isOriginalThird && <span className="text-[9px] font-bold text-gray-500 bg-gray-200 px-1 rounded flex-shrink-0 no-underline">1/3</span>}
                                {item.isCorrected && <span className={`text-[9px] font-bold px-1 rounded flex-shrink-0 no-underline ${item.bgOperation === 'add' ? 'text-emerald-600 bg-emerald-100' : 'text-blue-500 bg-blue-100'}`}>{item.bgOperation === 'add' ? '加算' : item.bgOperation === 'subtract+add' ? '補正+加算' : '補正'}</span>}
                            </button>
                        </td>
                    );
                }

                if (col.id === 'ncResult') {
                    return (
                        <td key={cIndex} className={`${cellClass} text-center font-bold text-blue-600`} onMouseDown={(e) => handleMouseDown(e, rIndex, cIndex)} onMouseEnter={() => handleMouseEnter(rIndex, cIndex)}>
                            NC-{item.ncResult}
                        </td>
                    );
                }

                if (col.isSelect) {
                    return (
                        <td 
                            key={cIndex} 
                            className={`${cellClass} group`} 
                            onMouseDown={(e) => handleMouseDown(e, rIndex, cIndex)} 
                            onMouseEnter={() => handleMouseEnter(rIndex, cIndex)}
                            onDoubleClick={() => handleDoubleClick(rIndex, cIndex)}
                            title="ダブルクリックしてグループを変更"
                        >
                            <div className="flex justify-between items-center w-full">
                                <span>{item[col.id]}</span>
                                <svg className="w-3 h-3 text-gray-400 opacity-0 group-hover:opacity-100 transition-opacity" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 9l-7 7-7-7"></path></svg>
                            </div>
                        </td>
                    );
                }

                return (
                    <td 
                        key={cIndex} 
                        className={cellClass} 
                        onMouseDown={(e) => handleMouseDown(e, rIndex, cIndex)} 
                        onMouseEnter={() => handleMouseEnter(rIndex, cIndex)}
                        onDoubleClick={() => handleDoubleClick(rIndex, cIndex)}
                        title={item[col.id]}
                    >
                        {item[col.id]}
                    </td>
                );
            };

            return (
                <div 
                    ref={tableContainerRef}
                    className="flex flex-col w-full h-full min-h-0"
                >
                    {/* ツールバー (上下移動) */}
                    <div className="flex items-center space-x-2 mb-2 shrink-0">
                        <span className="text-xs font-bold text-gray-600">行の移動:</span>
                        <button 
                            onClick={() => handleMoveSelectedRows('up')}
                            disabled={selectedCells.size === 0 || getSelectedRowIndices()[0] === 0}
                            className="px-2 py-1 bg-white hover:bg-gray-50 text-gray-700 text-xs rounded border border-gray-300 shadow-sm disabled:opacity-50 disabled:cursor-not-allowed"
                        >
                            ▲ 上へ
                        </button>
                        <button 
                            onClick={() => handleMoveSelectedRows('down')}
                            disabled={selectedCells.size === 0 || getSelectedRowIndices().pop() === displayItems.length - 1}
                            className="px-2 py-1 bg-white hover:bg-gray-50 text-gray-700 text-xs rounded border border-gray-300 shadow-sm disabled:opacity-50 disabled:cursor-not-allowed"
                        >
                            ▼ 下へ
                        </button>
                        {onRemoveItem && (
                            <button
                                onClick={handleRemoveSelectedRows}
                                disabled={selectedCells.size === 0}
                                className="px-2 py-1 bg-red-50 hover:bg-red-100 text-red-600 text-xs rounded border border-red-200 shadow-sm disabled:opacity-50 disabled:cursor-not-allowed"
                                title="選択セルを含む行を一括削除"
                            >
                                🗑️ 選択行を削除
                            </button>
                        )}
                    </div>

                    <div 
                        className="overflow-x-auto overflow-y-auto border border-gray-300 rounded bg-white shadow-inner relative flex-grow min-h-0" 
                        onContextMenu={handleTableContextMenu}
                    >
                        <table className="w-full text-left border-collapse whitespace-nowrap">
                            <thead className="text-xs text-gray-700 bg-gray-100 sticky top-0 z-30 shadow-sm border-b border-gray-300">
                                <tr>
                                    <th className="px-2 py-2 border-r border-gray-300 w-8 text-center bg-gray-100" title="表示/非表示の切り替え">表示</th>
                                    {onRemoveItem && <th className="px-1 py-2 border-r border-gray-300 w-8 text-center bg-gray-100"></th>} {/* 削除ボタン用 */}
                                    {columns.map(c => (
                                        <th key={c.id} className="px-3 py-2 border-r border-gray-300 bg-gray-100 font-semibold text-gray-600">
                                            {c.title}
                                        </th>
                                    ))}
                                </tr>
                            </thead>
                            <tbody>
                                {displayItems.map((item, rIndex) => (
                                    <tr key={item.id} className={`border-b border-gray-200 hover:bg-blue-50/20 ${item.isCorrected ? 'bg-blue-50/10' : ''}`}>
                                        <td className="px-2 py-1 text-center border-r border-gray-300 bg-gray-50/50">
                                            <input 
                                                type="checkbox" 
                                                checked={item.isVisible} 
                                                onChange={() => handleCheckboxChange(item, rIndex)}
                                                className="w-4 h-4 text-blue-600 rounded cursor-pointer"
                                                title="グラフに表示する"
                                            />
                                        </td>
                                        {onRemoveItem && (
                                            <td className="px-1 py-1 text-center border-r border-gray-300 bg-gray-50/50">
                                                <button 
                                                    onClick={() => handleRemoveRow(item, rIndex)}
                                                    className="text-red-400 hover:text-red-600 font-bold w-6 h-6 rounded hover:bg-red-50 flex items-center justify-center transition-colors mx-auto"
                                                    title="削除"
                                                    tabIndex="-1"
                                                >×</button>
                                            </td>
                                        )}
                                        {columns.map((_, cIndex) => renderCell(item, rIndex, cIndex))}
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                        <datalist id="group-list">
                            {groups.map(g => <option key={g} value={g} />)}
                        </datalist>

                        {/* 右クリックコンテキストメニュー */}
                        {contextMenu && (
                            <div 
                                className="fixed z-50 bg-white border border-gray-200 shadow-xl rounded py-1 text-sm text-gray-700 min-w-[160px]"
                                style={{ top: contextMenu.y, left: contextMenu.x }}
                                onClick={(e) => e.stopPropagation()}
                            >
                                <div className="px-3 py-1.5 font-bold text-gray-500 bg-gray-100 border-b text-xs">選択行のグループを変更</div>
                                <div className="max-h-48 overflow-y-auto">
                                    {groups.map(g => (
                                        <div 
                                            key={g} 
                                            className="px-4 py-1.5 hover:bg-blue-50 cursor-pointer"
                                            onClick={() => {
                                                const rows = getSelectedRowIndices();
                                                const selectedIds = rows.map(r => displayItems[r].id);
                                                setDataItems(prev => prev.map(item => selectedIds.includes(item.id) ? { ...item, groupName: g } : item));
                                                setContextMenu(null);
                                            }}
                                        >
                                            {g}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </div>

                    {detailItem && (
                        <div className="fixed inset-0 z-[220] bg-black bg-opacity-40 flex items-center justify-center p-4">
                            <div className="bg-white rounded-xl shadow-2xl w-[760px] max-w-full max-h-[85vh] flex flex-col overflow-hidden">
                                <div className="p-4 border-b bg-gray-50 flex justify-between items-start gap-4 shrink-0">
                                    <div className="min-w-0">
                                        <h3 className="font-bold text-gray-800 text-lg truncate" title={detailItem.fileName}>{detailItem.fileName}</h3>
                                        <p className="text-xs text-gray-500 mt-1">
                                            オクターブ分析結果 / 判定: <span className="font-bold text-blue-700">NC-{detailItem.ncResult}</span>
                                            <span className="ml-2">凡例: {detailItem.legendName}</span>
                                        </p>
                                    </div>
                                    <button onClick={() => setDetailItem(null)} className="text-gray-500 hover:text-gray-800 text-xl font-bold shrink-0">&times;</button>
                                </div>
                                <div className="p-4 overflow-auto">
                                    <p className="text-xs text-gray-500 mb-3">赤字の周波数が、このデータのNC判定値を決めた原因周波数です。リファレンス値は判定NC値の規格値です。</p>
                                    <table className="w-full text-sm border-collapse">
                                        <thead className="bg-gray-100 text-gray-700 sticky top-0">
                                            <tr>
                                                <th className="border border-gray-300 px-3 py-2 text-left">周波数</th>

                                                        />

                                                    <td className="border border-gray-300 px-3 py-2 text-right">{formatDetailValue(row.referenceValue)}</td>
                                                    <td className="border border-gray-300 px-3 py-2 text-center">{row.requiredNc ? `NC-${row.requiredNc}` : '-'}</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                                <div className="p-3 border-t bg-gray-50 flex justify-end shrink-0">
                                    <button onClick={() => setDetailItem(null)} className="px-5 py-1.5 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-lg">閉じる</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const App = () => {
            const [dataItems, setDataItems] = React.useState(initState?.dataItems || []);
            const [groups, setGroups] = React.useState(initState?.groups || ['Group 1', 'Group 2', 'Group 3']);
            const defaultProjectName = initState?.projects?.[0] || 'Project 1';
            const [projects, setProjects] = React.useState(initState?.projects || [defaultProjectName]);
            const [htmlExportProjects, setHtmlExportProjects] = React.useState(initState?.projects || [defaultProjectName]);
            const [showHtmlExportModal, setShowHtmlExportModal] = React.useState(false);
            const [selectedProject, setSelectedProject] = React.useState(defaultProjectName);
            const [groupProjects, setGroupProjects] = React.useState(() => initState?.groupProjects || Object.fromEntries((initState?.groups || ['Group 1', 'Group 2', 'Group 3']).map(g => [g, defaultProjectName])));
            const [visibleProjects, setVisibleProjects] = React.useState(initState?.visibleProjects || (initState?.projects || [defaultProjectName]));
            const [editingProjectName, setEditingProjectName] = React.useState(null);
            const [editingProjectValue, setEditingProjectValue] = React.useState('');
            const projectImportInputRef = React.useRef(null);
            const workspaceImportInputRef = React.useRef(null);
            const [workspaceFileHandle, setWorkspaceFileHandle] = React.useState(null);
            const [workspaceFileName, setWorkspaceFileName] = React.useState('NC_Report_Settings.json');
            const [workspaceSaveStatus, setWorkspaceSaveStatus] = React.useState('');
            const [workspaceLastSavedAt, setWorkspaceLastSavedAt] = React.useState(null);
            const undoStackRef = React.useRef([]);
            const redoStackRef = React.useRef([]);
            const lastHistorySnapshotRef = React.useRef(null);
            const isRestoringHistoryRef = React.useRef(false);
            const [historyVersion, setHistoryVersion] = React.useState(0);
            const [newGroupName, setNewGroupName] = React.useState('');
            const [editingGroup, setEditingGroup] = React.useState(null);
            const [editingGroupName, setEditingGroupName] = React.useState('');
            const [bgNoiseData, setBgNoiseData] = React.useState(initState?.bgNoiseData || {});
            const [addNoiseData, setAddNoiseData] = React.useState(initState?.addNoiseData || {});
            const [addNoiseMode, setAddNoiseMode] = React.useState(initState?.addNoiseMode || (initState?.bgNoiseMode === 'add' ? 'add' : 'none'));
            const [bgCorrectionMethod, setBgCorrectionMethod] = React.useState(initState?.bgCorrectionMethod || 'energy');
            const [bgNoiseMode, setBgNoiseMode] = React.useState(initState?.bgNoiseMode === 'add' ? 'subtract' : (initState?.bgNoiseMode || 'subtract'));
            const [groupOctaveModes, setGroupOctaveModes] = React.useState(initState?.groupOctaveModes || {});
            const [visibleNcCurves, setVisibleNcCurves] = React.useState(initState?.visibleNcCurves || [15, 20, 25, 30, 35, 40, 45, 50, 55, 60, 65]);
            const [lineWidth, setLineWidth] = React.useState(initState?.lineWidth || 3);
            const [pointSize, setPointSize] = React.useState(initState?.pointSize || 4);
            const [axisLineWidth, setAxisLineWidth] = React.useState(initState?.axisLineWidth || 1);
            const [axisLabelFontSize, setAxisLabelFontSize] = React.useState(initState?.axisLabelFontSize || 14);
            const [copyLegendFontSize, setCopyLegendFontSize] = React.useState(initState?.copyLegendFontSize || initState?.axisLabelFontSize || 14);
            const [tickFontSize, setTickFontSize] = React.useState(initState?.tickFontSize || 12);
            const [yAxisMaxAuto, setYAxisMaxAuto] = React.useState(initState?.yAxisMaxAuto ?? true);
            const [yAxisMaxManual, setYAxisMaxManual] = React.useState(initState?.yAxisMaxManual || 100);

            const [useFixedCopyAspectRatio, setUseFixedCopyAspectRatio] = React.useState(initState?.useFixedCopyAspectRatio || false);
            
            const [isTableMaximized, setIsTableMaximized] = React.useState(false);
            const [isPreviewMode, setIsPreviewMode] = React.useState(false); // プレビューモードのトグル
            const [errorMsg, setErrorMsg] = React.useState('');
            const [isPyodideReady, setIsPyodideReady] = React.useState(false);
            const [isExporting, setIsExporting] = React.useState(false);

            const activeViewerMode = isExportedViewerMode || isPreviewMode; // ビューアーとして機能させるかどうか

            React.useEffect(() => {
                if (isExportedViewerMode) return;
                const clearCachedWorkspaceHandle = async () => {
                    try {
                        await Promise.all([
                            workspaceDbSet(WORKSPACE_HANDLE_KEY, null),
                            workspaceDbSet(WORKSPACE_FILE_NAME_KEY, 'NC_Report_Settings.json')
                        ]);

                        console.warn('保存先情報の初期化に失敗しました:', err);
                    }
                };
                clearCachedWorkspaceHandle();
            }, []);

            const persistWorkspaceHandle = React.useCallback(async (fileHandle) => {
                setWorkspaceFileHandle(fileHandle);
                setWorkspaceFileName(fileHandle?.name || 'NC_Report_Settings.json');
                try {
                    await Promise.all([
                        workspaceDbSet(WORKSPACE_HANDLE_KEY, null),
                        workspaceDbSet(WORKSPACE_FILE_NAME_KEY, 'NC_Report_Settings.json')
                    ]);
                } catch (err) {
                    console.warn('保存先情報のキャッシュ削除に失敗しました:', err);
                }
            }, []);

            React.useEffect(() => {
                setVisibleProjects(prev => {
                    const valid = prev.filter(p => projects.includes(p));
                    return valid.length > 0 ? valid : [...projects];
                });
                if (!projects.includes(selectedProject)) {
                    setSelectedProject(projects[0] || 'Project 1');
                }
            }, [projects]);

            React.useEffect(() => {
                setHtmlExportProjects(prev => {
                    const existing = prev.filter(p => projects.includes(p));
                    const added = projects.filter(p => !prev.includes(p));
                    return [...existing, ...added];
                });
            }, [projects]);

            const projectFilteredGroups = React.useMemo(() => {
                if (!activeViewerMode) return groups;
                return groups.filter(g => visibleProjects.includes(groupProjects[g] || defaultProjectName));
            }, [activeViewerMode, groups, visibleProjects, groupProjects]);

            // ドラッグ＆ドロップ状態管理
            const [draggedGroup, setDraggedGroup] = React.useState(null);

            const handleDragStart = (e, gName) => {
                setDraggedGroup(gName);
                e.dataTransfer.effectAllowed = 'move';
                e.dataTransfer.setData('text/plain', gName);
            };

            const handleDragOver = (e) => {
                e.preventDefault();
                e.dataTransfer.dropEffect = 'move';

                // 自動スクロール処理（画面上下端に近づいた際にスクロール）
                const scrollMargin = 80;
                const scrollSpeed = 15;
                if (e.clientY < scrollMargin) {
                    window.scrollBy(0, -scrollSpeed);
                } else if (window.innerHeight - e.clientY < scrollMargin) {
                    window.scrollBy(0, scrollSpeed);
                }
            };

            const handleDrop = (e, targetGroup) => {
                e.preventDefault();
                if (!draggedGroup || draggedGroup === targetGroup) return;

                setGroups(prevGroups => {
                    const newGroups = [...prevGroups];
                    const draggedIdx = newGroups.indexOf(draggedGroup);
                    const targetIdx = newGroups.indexOf(targetGroup);
                    
                    if (draggedIdx > -1 && targetIdx > -1) {
                        newGroups.splice(draggedIdx, 1);
                        newGroups.splice(targetIdx, 0, draggedGroup);
                    }
                    return newGroups;
                });
                setDraggedGroup(null);
            };

            // エクスポート用データの構築（生テキストデータを含まない軽量版）
            const getExportStateObject = (targetProjects = projects) => {
                const targetProjectSet = new Set(targetProjects);
                const htmlExportGroups = groups.filter(g => targetProjectSet.has(groupProjects[g] || defaultProjectName));
                const htmlExportGroupSet = new Set(htmlExportGroups);
                const htmlExportDataItems = dataItems
                    .filter(item => htmlExportGroupSet.has(item.groupName))
                    .map(item => {
                        const { rawText, ...rest } = item;
                        return rest;
                    });
                const htmlExportBgNoiseData = {};
                const htmlExportAddNoiseData = {};
                for (const [key, value] of Object.entries(bgNoiseData)) {
                    if (!htmlExportGroupSet.has(key)) continue;
                    const { rawText, ...rest } = value;
                    htmlExportBgNoiseData[key] = rest;
                }
                for (const [key, value] of Object.entries(addNoiseData)) {
                    if (!htmlExportGroupSet.has(key)) continue;
                    const { rawText, ...rest } = value;
                    htmlExportAddNoiseData[key] = rest;
                }
                const htmlExportGroupProjects = Object.fromEntries(
                    Object.entries(groupProjects).filter(([groupName, projectName]) => htmlExportGroupSet.has(groupName) && targetProjectSet.has(projectName))
                );
                const htmlExportGroupOctaveModes = Object.fromEntries(
                    Object.entries(groupOctaveModes).filter(([groupName]) => htmlExportGroupSet.has(groupName))
                );
                return {
                    version: "1.3", 
                    dataItems: htmlExportDataItems, 
                    groups: htmlExportGroups,
                    projects: targetProjects,
                    groupProjects: htmlExportGroupProjects,
                    visibleProjects: targetProjects,
                    bgNoiseData: htmlExportBgNoiseData, 
                    addNoiseData: htmlExportAddNoiseData,
                    addNoiseMode,
                    bgCorrectionMethod, 
                    bgNoiseMode,
                    groupOctaveModes: htmlExportGroupOctaveModes,
                    visibleNcCurves, 
                    lineWidth, 
                    pointSize,
                    axisLineWidth,
                    axisLabelFontSize,
                    copyLegendFontSize,
                    tickFontSize,
                    yAxisMaxAuto, 
                    yAxisMaxManual,
                    viewerGridCols,
                    useFixedCopyAspectRatio
                };
            };

            const getWorkspaceExportData = () => ({
                version: "1.4", dataItems, groups, projects, selectedProject, groupProjects, visibleProjects, bgNoiseData, addNoiseData, addNoiseMode, bgCorrectionMethod, bgNoiseMode,
                groupOctaveModes, visibleNcCurves, lineWidth, pointSize, axisLineWidth, axisLabelFontSize, copyLegendFontSize, tickFontSize, yAxisMaxAuto, yAxisMaxManual, viewerGridCols, useFixedCopyAspectRatio
            });

            const downloadWorkspaceJSON = (fileName = workspaceFileName) => {
                const blob = new Blob([JSON.stringify(getWorkspaceExportData(), null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = fileName || 'NC_Report_Settings.json';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            };

            const writeWorkspaceFile = async (fileHandle) => {
                const hasPermission = await verifyFileHandlePermission(fileHandle, true);
                if (!hasPermission) throw new Error('保存先ファイルへの書き込み権限がありません。');
                const writable = await fileHandle.createWritable();
                try {
                    await writable.write(JSON.stringify(getWorkspaceExportData(), null, 2));
                } finally {
                    await writable.close();
                }
            };

            const markWorkspaceSaved = (fileHandle, messagePrefix = '保存しました') => {
                const now = new Date();
                setWorkspaceLastSavedAt(now.toISOString());
                setWorkspaceSaveStatus(`${messagePrefix}: ${fileHandle?.name || workspaceFileName} (${now.toLocaleTimeString()})`);
            };

            const handleExportJSON = () => {
                downloadWorkspaceJSON('NC_Report_Settings.json');
                setWorkspaceSaveStatus('ダウンロード保存しました。ブラウザのダウンロード先を確認してください。');
            };

            const handleSaveWorkspaceAs = async () => {
                if (!window.showSaveFilePicker) {
                    downloadWorkspaceJSON(workspaceFileName);
                    setWorkspaceSaveStatus('このブラウザは保存先の保持に非対応です。JSONをダウンロードしました。');
                    return;
                }
                try {
                    const fileHandle = await window.showSaveFilePicker({
                        suggestedName: workspaceFileName || 'NC_Report_Settings.json',
                        types: [{ description: 'JSON', accept: { 'application/json': ['.json'] } }]
                    });
                    await writeWorkspaceFile(fileHandle);
                    await persistWorkspaceHandle(fileHandle);
                    markWorkspaceSaved(fileHandle, '保存先を設定して保存しました');
                } catch (err) {
                    if (err?.name !== 'AbortError') {
                        console.error('ワークスペースの保存に失敗しました:', err);
                        setWorkspaceSaveStatus('保存に失敗しました。');
                        alert(`ワークスペースの保存に失敗しました。
${err?.message || err}`);
                    }
                }
            };

            const handleOverwriteWorkspace = async () => {
                if (!window.showSaveFilePicker) {
                    downloadWorkspaceJSON(workspaceFileName);
                    setWorkspaceSaveStatus('このブラウザは上書き保存に非対応です。JSONをダウンロードしました。');
                    return;
                }
                if (!workspaceFileHandle) {
                    setWorkspaceSaveStatus('上書き保存先が未設定です。保存先を選択してください。');
                    await handleSaveWorkspaceAs();
                    return;
                }
                try {
                    await writeWorkspaceFile(workspaceFileHandle);
                    markWorkspaceSaved(workspaceFileHandle, '上書き保存しました');
                } catch (err) {
                    console.error('ワークスペースの上書き保存に失敗しました:', err);
                    setWorkspaceFileHandle(null);
                    try { await workspaceDbSet(WORKSPACE_HANDLE_KEY, null); } catch (persistErr) { console.warn('保存先情報のクリアに失敗しました:', persistErr); }
                    setWorkspaceSaveStatus('上書き保存に失敗しました。保存先を選び直してください。');
                    alert(`ワークスペースの上書き保存に失敗しました。保存先を選び直してください。
${err?.message || err}`);
                }
            };

            const handleExportProjectJSON = (projectName = selectedProject) => {
                const projectGroups = groups.filter(g => (groupProjects[g] || defaultProjectName) === projectName);
                const projectGroupSet = new Set(projectGroups);
                const projectBgNoiseData = {};
                const projectAddNoiseData = {};
                const projectGroupOctaveModes = {};
                projectGroups.forEach(g => {
                    if (bgNoiseData[g]) projectBgNoiseData[g] = bgNoiseData[g];
                    if (addNoiseData[g]) projectAddNoiseData[g] = addNoiseData[g];
                    if (groupOctaveModes[g]) projectGroupOctaveModes[g] = groupOctaveModes[g];
                });
                const exportData = {
                    version: "1.4",
                    dataItems: dataItems.filter(item => projectGroupSet.has(item.groupName)),
                    groups: projectGroups,
                    projects: [projectName],
                    groupProjects: Object.fromEntries(projectGroups.map(g => [g, projectName])),
                    visibleProjects: [projectName],
                    bgNoiseData: projectBgNoiseData,
                    addNoiseData: projectAddNoiseData,
                    addNoiseMode,
                    bgCorrectionMethod,
                    bgNoiseMode,
                    groupOctaveModes: projectGroupOctaveModes,
                    visibleNcCurves,
                    lineWidth,
                    pointSize,
                    axisLineWidth,
                    axisLabelFontSize,
                    copyLegendFontSize,
                    tickFontSize,
                    yAxisMaxAuto,
                    yAxisMaxManual,
                    viewerGridCols,
                    useFixedCopyAspectRatio
                };
                const safeProject = projectName.replace(/[\/:*?"<>|]/g, "_");
                const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `NC_Project_${safeProject}.json`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            };

            const handleExportHTML = () => {
                const babelScripts = document.querySelectorAll('script[type="text/babel"]');
                let appScript = '';
                if (babelScripts.length > 0) {
                    appScript = babelScripts[0].innerHTML;
                } else {
                    alert("ソースコードの取得に失敗しました。");
                    return;
                }

                const selectedHtmlExportProjects = projects.filter(p => htmlExportProjects.includes(p));
                if (selectedHtmlExportProjects.length === 0) {
                    alert("HTML出力するプロジェクトを1つ以上選択してください。");
                    return;
                }
                const exportObj = getExportStateObject(selectedHtmlExportProjects);
                // 確実にタグ干渉を防ぐためURLエンコード
                const safeData = encodeURIComponent(JSON.stringify(exportObj));

                const cleanHtml = `<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NC値レポートビューアー</title>
    <script src="https://cdn.tailwindcss.com"><\/script>
    <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"><\/script>
    <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"><\/script>
    <script src="https://unpkg.com/@babel/standalone@7.26.9/babel.min.js"><\/script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"><\/script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"><\/script>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"><\/script>
    <style>
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #3498db; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .select-none { user-select: none; -webkit-user-select: none; }
        .drag-handle { cursor: grab; }
        .drag-handle:active { cursor: grabbing; }
        .dragging { opacity: 0.5; border: 2px dashed #3b82f6; }
    </style>
</head>
<body class="bg-slate-50 text-gray-800 font-sans min-h-screen">
    <div id="root"></div>
    <script id="initial-data" type="text/plain">${safeData}<\/script>
    <script type="text/babel" data-presets="env,react">${appScript}<\/script>
</body>
</html>`;

                const blob = new Blob([cleanHtml], { type: 'text/html;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `NC_Report_Viewer.html`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                setShowHtmlExportModal(false);
            };

            const handleExportZip = async (projectNameFilter = null) => {
                const exportItems = projectNameFilter ? dataItems.filter(item => (groupProjects[item.groupName] || defaultProjectName) === projectNameFilter) : dataItems;
                if (exportItems.length === 0) return;
                setIsExporting(true);
                try {
                    const zip = new window.JSZip();
                    exportItems.forEach(item => {
                        const projectName = groupProjects[item.groupName] || defaultProjectName;
                        const safeProject = projectName.replace(/[\\/:*?"<>|]/g, "_");
                        const safeGroup = item.groupName.replace(/[\\/:*?"<>|]/g, "_");
                        const safeLegend = item.legendName.replace(/[\\/:*?"<>|]/g, "_");
                        const folder = zip.folder(safeProject).folder(safeGroup);
                        folder.file(`${safeProject}_${safeGroup}_${safeLegend}.txt`, item.rawText);
                    });
                    const blob = await zip.generateAsync({ type: "blob" });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `NC_Data_Files.zip`;
                    a.click();
                    URL.revokeObjectURL(url);
                } catch (e) {
                    alert("ZIPの作成に失敗しました: " + e.message);
                } finally {
                    setIsExporting(false);
                }
            };

            const makeUniqueName = (baseName, existingNames) => {
                let candidate = baseName || 'Untitled';
                let count = 2;
                while (existingNames.includes(candidate)) {
                    candidate = `${baseName || 'Untitled'} (${count})`;
                    count++;
                }
                return candidate;
            };

            const readJsonFile = (file) => new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        resolve(JSON.parse(event.target.result));
                    } catch (err) {
                        reject(err);
                    }
                };
                reader.onerror = reject;
                reader.readAsText(file);
            });

            const buildMergedProjectData = (baseState, importedData) => {
                const importedProjects = importedData.projects || ['Imported Project'];
                const importedGroups = importedData.groups || [];
                const importedGroupProjects = importedData.groupProjects || Object.fromEntries(importedGroups.map(g => [g, importedProjects[0]]));
                const projectMap = {};
                const groupMap = {};
                const nextProjects = [...baseState.projects];
                const nextGroups = [...baseState.groups];

                importedProjects.forEach(projectName => {
                    const uniqueProject = makeUniqueName(projectName, nextProjects);
                    projectMap[projectName] = uniqueProject;
                    nextProjects.push(uniqueProject);
                });

                importedGroups.forEach(groupName => {
                    const uniqueGroup = makeUniqueName(groupName, nextGroups);
                    groupMap[groupName] = uniqueGroup;
                    nextGroups.push(uniqueGroup);
                });

                const nextGroupProjects = { ...baseState.groupProjects };
                importedGroups.forEach(groupName => {
                    const sourceProject = importedGroupProjects[groupName] || importedProjects[0];
                    nextGroupProjects[groupMap[groupName]] = projectMap[sourceProject] || projectMap[importedProjects[0]] || nextProjects[0];
                });

                const nextDataItems = [
                    ...baseState.dataItems,
                    ...(importedData.dataItems || []).map(item => ({
                        ...item,
                        id: Math.random().toString(36).substring(2, 9),
                        groupName: groupMap[item.groupName] || item.groupName
                    }))
                ];

                const nextBgNoiseData = { ...baseState.bgNoiseData };
                const nextAddNoiseData = { ...baseState.addNoiseData };
                Object.entries(importedData.bgNoiseData || {}).forEach(([groupName, value]) => {
                    nextBgNoiseData[groupMap[groupName] || groupName] = value;
                });
                Object.entries(importedData.addNoiseData || {}).forEach(([groupName, value]) => {
                    nextAddNoiseData[groupMap[groupName] || groupName] = value;
                });

                const nextGroupOctaveModes = { ...baseState.groupOctaveModes };
                Object.entries(importedData.groupOctaveModes || {}).forEach(([groupName, value]) => {
                    nextGroupOctaveModes[groupMap[groupName] || groupName] = value;
                });

                return {

            const parseCsvLine = (line) => line.split(',').map(cell => cell.trim());

            const parseFrequencyLabel = (label) => {
                const normalized = label.trim().toLowerCase();
                const match = normalized.match(/^(\d+(?:\.\d+)?)(k)?$/);
                if (!match) return NaN;
                const value = parseFloat(match[1]);
                return match[2] ? value * 1000 : value;
            };

            const parseLpeqCsv = (lines) => {
                const headerLine = lines.find(line => /^\s*Mode\s*,/i.test(line));
                if (!headerLine) return null;

                const headers = parseCsvLine(headerLine);
                const lpeqLine = lines.find(line => /^\s*Lpeq\s*,/i.test(line));
                if (!lpeqLine) return null;

                const values = parseCsvLine(lpeqLine);
                const rawFreqs = [];
                const rawValues = [];
                headers.forEach((header, index) => {
                    const freq = parseFrequencyLabel(header);
                    if (freq >= 63 && freq <= 8000) {
                        const value = parseFloat(values[index]);
                        if (!isNaN(value)) {
                            rawFreqs.push(freq);
                            rawValues.push(value);
                        }
                    }
                });

                if (rawFreqs.length === 0) return null;
                return { isThirdOct: false, rawFreqs, rawValues };
            };

            const readAndParseFile = (file) => {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        try {
                            const text = event.target.result;
                            const lines = text.split(/\r?\n/);

                            const csvParsed = parseLpeqCsv(lines);
                            if (csvParsed) {
                                resolve({ ...csvParsed, fileName: file.name, rawText: text });
                                return;
                            }

                            let isThirdOct = false;
                            let hzLine = null;
                            let eqLine = null;
                            
                            for (let line of lines) {
                                if (line.includes('Resolution:') && line.includes('1/3')) isThirdOct = true;
                                if (line.includes('Band [Hz]')) hzLine = line;
                                if (line.includes('LZeq') || line.includes('LAeq') || line.includes('LCeq') || line.match(/\bLeq\b/)) {
                                    if (!eqLine) eqLine = line;
                                }
                            }
                            if (!hzLine || !eqLine) throw new Error(`${file.name}: 指定フォーマットのデータが見つかりません。`);

                            const rawFreqs = hzLine.trim().split(/[\s\t]+/).map(s => parseFloat(s)).filter(n => !isNaN(n));
                            const valsStr = eqLine.trim().split(/[\s\t]+/).slice(1);
                            const rawValues = valsStr.map(s => parseFloat(s));
                            
                            resolve({ isThirdOct, rawFreqs, rawValues, fileName: file.name, rawText: text });
                        } catch(err) {
                            reject(err);
                        }
                    }
                    reader.readAsText(file);
                });
            };

                            if (selectedVisibleIndices[0] === 0) return prev;
                            selectedVisibleIndices.forEach(index => {
                                [visibleIds[index - 1], visibleIds[index]] = [visibleIds[index], visibleIds[index - 1]];
                            });
                        } else if (direction === 'down') {
                            if (selectedVisibleIndices[selectedVisibleIndices.length - 1] === visibleIds.length - 1) return prev;
                            for (let i = selectedVisibleIndices.length - 1; i >= 0; i--) {
                                const index = selectedVisibleIndices[i];
                                [visibleIds[index + 1], visibleIds[index]] = [visibleIds[index], visibleIds[index + 1]];
                            }
                        }

                        const visibleItemsById = Object.fromEntries(arr.filter(item => visibleIds.includes(item.id)).map(item => [item.id, item]));
                        const reorderedVisibleItems = visibleIds.map(id => visibleItemsById[id]);
                        let visibleCursor = 0;
                        return arr.map(item => orderedDisplayIds.includes(item.id) ? reorderedVisibleItems[visibleCursor++] : item);
                    }

                    const selectedIndices = selectedIds.map(id => arr.findIndex(i => i.id === id)).filter(idx => idx !== -1).sort((a, b) => a - b);
                    if (selectedIndices.length === 0) return prev;

                    if (direction === 'up') {
                        if (selectedIndices[0] === 0) return prev;
                        for (let i = 0; i < selectedIndices.length; i++) {
                            const idx = selectedIndices[i];
                            [arr[idx - 1], arr[idx]] = [arr[idx], arr[idx - 1]];
                        }
                    } else if (direction === 'down') {
                        if (selectedIndices[selectedIndices.length - 1] === arr.length - 1) return prev;
                        for (let i = selectedIndices.length - 1; i >= 0; i--) {
                            const idx = selectedIndices[i];
                            [arr[idx + 1], arr[idx]] = [arr[idx], arr[idx + 1]];
                        }
                    }
                    return arr;
                });
            };

            const handleToggleVisible = (ids, targetState) => {
                setDataItems(prev => prev.map(item => ids.includes(item.id) ? { ...item, isVisible: targetState } : item));
            };

            const groupedDataWithBg = React.useMemo(() => {
                return dataItems.reduce((acc, item) => {
                    const group = item.groupName || 'No Group';
                    if (!acc[group]) acc[group] = [];
                    
                    let octMode = '1/1';
                    if (item.isOriginalThird) {
                        octMode = groupOctaveModes[group] || '1/3';
                    }
                    
                    let corrValues = getProcessedItemData(item.rawFreqs, item.rawValues, item.isOriginalThird, octMode);
                    let isCorrected = false;
                    let bgOperation = null;
                    
                    if ((bgNoiseMode === 'subtract' && bgNoiseData[group]) || (bgNoiseMode === 'add' && addNoiseData[group])) {
                        const bgItem = bgNoiseMode === 'add' ? addNoiseData[group] : bgNoiseData[group];
                        const bgVals = getProcessedItemData(bgItem.rawFreqs, bgItem.rawValues, bgItem.isOriginalThird, octMode);
                        corrValues = bgNoiseMode === 'add'
                            ? addBackgroundNoiseArray(corrValues, bgVals)
                            : subtractBackgroundNoiseArray(corrValues, bgVals, bgCorrectionMethod);
                        isCorrected = true;
                        bgOperation = 'subtract';
                    }

                    if (addNoiseMode === 'add' && addNoiseData[group]) {
                        const addItem = addNoiseData[group];
                        const addVals = getProcessedItemData(addItem.rawFreqs, addItem.rawValues, addItem.isOriginalThird, octMode);
                        corrValues = addBackgroundNoiseArray(corrValues, addVals);
                        isCorrected = true;
                        bgOperation = bgOperation ? `${bgOperation}+add` : 'add';
                    }
                    const ncVal = calculateNC(corrValues);
                    
                    acc[group].push({
                        ...item,
                        values: corrValues,
                        ncResult: ncVal,
                        isCorrected: isCorrected,
                        bgOperation: bgOperation,
                        appliedOctMode: octMode
                    });
                    return acc;
                }, {});
            }, [dataItems, bgNoiseData, addNoiseData, addNoiseMode, bgCorrectionMethod, bgNoiseMode, groupOctaveModes]);

            const bgGraphData = React.useMemo(() => {
                if (bgNoiseMode !== 'overlay') return {};
                return groups.reduce((acc, group) => {
                    const bgItem = bgNoiseData[group];
                    if (!bgItem) return acc;

                    const groupItems = dataItems.filter(item => (item.groupName || 'No Group') === group);
                    const hasThirdItem = groupItems.some(item => item.isOriginalThird);
                    const octMode = (hasThirdItem || bgItem.isOriginalThird) ? (groupOctaveModes[group] || '1/3') : '1/1';
                    const values = getProcessedItemData(bgItem.rawFreqs, bgItem.rawValues, bgItem.isOriginalThird, octMode);

                    acc[group] = {
                        ...bgItem,
                        id: `bg-${group}`,
                        values,
                        ncResult: calculateNC(values),
                        appliedOctMode: octMode
                    };
                    return acc;
                }, {});
            }, [bgNoiseMode, bgNoiseData, groups, dataItems, groupOctaveModes]);

            const addGraphData = React.useMemo(() => {
                if (addNoiseMode !== 'overlay') return {};
                return groups.reduce((acc, group) => {
                    const addItem = addNoiseData[group];
                    if (!addItem) return acc;

                    const groupItems = dataItems.filter(item => (item.groupName || 'No Group') === group);
                    const hasThirdItem = groupItems.some(item => item.isOriginalThird);
                    const octMode = (hasThirdItem || addItem.isOriginalThird) ? (groupOctaveModes[group] || '1/3') : '1/1';
                    const values = getProcessedItemData(addItem.rawFreqs, addItem.rawValues, addItem.isOriginalThird, octMode);

                    acc[group] = {
                        ...addItem,
                        id: `add-${group}`,
                        values,
                        ncResult: calculateNC(values),
                        appliedOctMode: octMode
                    };
                    return acc;
                }, {});
            }, [addNoiseMode, addNoiseData, groups, dataItems, groupOctaveModes]);

            const selectedProjectGroups = React.useMemo(() => {
                return groups.filter(g => (groupProjects[g] || defaultProjectName) === selectedProject);
            }, [groups, groupProjects, selectedProject]);

            const displayItems = React.useMemo(() => {
                const arr = [];
                // dataItemsの順番ベースで表示用配列を構築
                return dataItems.map(origItem => {
                    let found;
                    Object.values(groupedDataWithBg).some(items => {
                        found = items.find(i => i.id === origItem.id);
                        return found;
                    });
                    return found || origItem;
                }).filter(item => selectedProjectGroups.includes(item.groupName));
            }, [dataItems, groupedDataWithBg, selectedProjectGroups]);

            const handleExportExcel = async (projectNameFilter = null) => {
                const hasExportData = projectNameFilter ? dataItems.some(item => (groupProjects[item.groupName] || defaultProjectName) === projectNameFilter) : dataItems.length > 0;
                if (!hasExportData || !window.pyodideInstance) return;
                setIsExporting(true);
                try {
                    const ncCurvesForExport = {};
                    const pyNcColors = {};
                    
                    for(let nc of visibleNcCurves) {
                        pyNcColors[nc.toString()] = ncColors[nc].replace('#', '');
                    }

                    const groupsForPy = {};
                    groups.forEach(gName => {
                        if (projectNameFilter && (groupProjects[gName] || defaultProjectName) !== projectNameFilter) return;
                        const items = groupedDataWithBg[gName];
                        if(!items) return;

                        let maxVal = 0;
                        const hasThird = items.some(item => item.appliedOctMode === '1/3');
                        const activeFreqs = hasThird ? allFreqs : targetOctFreqs;
                        
                        if (visibleNcCurves.length > 0) {
                            const maxNc = Math.max(...visibleNcCurves);
                            maxVal = Math.max(maxVal, getNcCurve(maxNc)[0]);
                        }
                        
                        const visibleItems = items.filter(item => item.isVisible);
                        const bgGraphItem = bgGraphData[gName];
                        const exportItems = bgGraphItem ? [...visibleItems, { ...bgGraphItem, legendName: `暗騒音: ${bgGraphItem.fileName}` }] : visibleItems;

                        const slimItems = exportItems.map(item => {
                            const slimVals = [];
                            allFreqs.forEach((f, i) => {
                                if (activeFreqs.includes(f)) slimVals.push(item.values[i]);
                            });
                            slimVals.forEach(v => {
                                if(v !== null) maxVal = Math.max(maxVal, v);
                            });
                            return {
                                legendName: `${item.legendName} (NC-${item.ncResult})`,
                                values: slimVals
                            };
                        });


                const yMax = yAxisMaxAuto ? Math.max(50, Math.ceil((maxVal + 5) / 10) * 10) : yAxisMaxManual;
                        
                        const exportCurves = {};
                        for(let nc of visibleNcCurves) {
                            const cVals = [];
                            allFreqs.forEach((f, i) => {
                                if (activeFreqs.includes(f)) {
                                    cVals.push(getNcCurveInterpolated(nc, [f])[0]);
                                }
                            });
                            exportCurves[`NC-${nc}`] = cVals;
                        }

                        groupsForPy[gName] = {
                            freqs: activeFreqs.map(getLabelStr),
                            items: slimItems,
                            ncCurves: exportCurves,
                            yMax: yMax,
                            hasThird: hasThird
                        };
                    });
                    
                    window.pyDataObj = {
                        groups: groupsForPy,
                        ncColors: pyNcColors,
                        lineWidthEmu: lineWidth * 9525,
                        pointSize: pointSize
                    };

                    const pyCode = `
import openpyxl
from openpyxl.chart import LineChart, Reference
from openpyxl.chart.layout import Layout, ManualLayout
from io import BytesIO
from js import pyDataObj

def create_excel():
    data = pyDataObj.to_py()
    wb = openpyxl.Workbook()
    default_sheet = wb.active
    
    groups = data['groups']
    nc_colors = data['ncColors']
    line_width_emu = data.get('lineWidthEmu', 30000)
    point_size = data.get('pointSize', 4)
    data_colors = ["8B4513", "006400", "00008B", "4B0082", "8B0000", "2F4F4F", "D2691E", "556B2F"]
    
    first = True
    for group_name, group_data in groups.items():
        freqs = group_data['freqs']
        items = group_data['items']
        nc_curves = group_data['ncCurves']
        y_max = group_data['yMax']

        safe_title = str(group_name).replace("/", "-").replace("\\\\", "-")[:31]
        if first:
            ws = default_sheet
            ws.title = safe_title
            first = False
        else:
            ws = wb.create_sheet(title=safe_title)
            
        curve_names = list(nc_curves.keys())
        item_names = [item['legendName'] for item in items]
        headers = ["Frequency (Hz)"] + item_names + curve_names
        ws.append(headers)
        
        for i in range(len(freqs)):
            row = [freqs[i]]
            for item in items:
                val = item['values'][i]
                row.append(val if val is not None else "")
            for c_name in curve_names:
                val = nc_curves[c_name][i]
                row.append(val if val is not None else "")
            ws.append(row)

        chart = LineChart()
        chart.title = str(group_name)
        chart.y_axis.title = "Sound Pressure Level (dB)"
        chart.x_axis.title = "Frequency (Hz)"
        chart.y_axis.scaling.min = 0
        chart.y_axis.scaling.max = y_max
        chart.display_blanks = 'span'
        
        chart.width = 28
        chart.height = 14
        chart.legend.position = "r"
        
        chart.layout = Layout(
            manualLayout=ManualLayout(
                x=0.05, y=0.05,
                w=0.75, h=0.85
            )
        )

        data_ref = Reference(ws, min_col=2, min_row=1, max_col=len(headers), max_row=len(freqs)+1)
        cats_ref = Reference(ws, min_col=1, min_row=2, max_row=len(freqs)+1)

        chart.add_data(data_ref, titles_from_data=True)
        chart.set_categories(cats_ref)

        num_items = len(items)

        for i in range(num_items):
            s = chart.series[i]
            color_hex = data_colors[i % len(data_colors)]
            s.graphicalProperties.line.solidFill = color_hex
            s.graphicalProperties.line.width = int(line_width_emu)
            s.marker.symbol = "circle"
            s.marker.size = int(point_size) if point_size > 0 else 2
            s.marker.graphicalProperties.solidFill = color_hex
            s.smooth = False

        for i in range(len(curve_names)):
            s = chart.series[num_items + i]
            nc_num_str = curve_names[i].split("-")[1]
            color_hex = nc_colors.get(nc_num_str, "FF0000")

            s.graphicalProperties.line.dashStyle = "dash"
            s.graphicalProperties.line.solidFill = color_hex
            s.graphicalProperties.line.width = int(max(10000, line_width_emu * 0.7))
            s.marker.symbol = "none"
            s.smooth = False

        ws.add_chart(chart, "A12")

    output = BytesIO()
    wb.save(output)
    return list(output.getvalue())
`;
                    const resultList = await window.pyodideInstance.runPythonAsync(pyCode + "\ncreate_excel()");
                    const uint8Array = new Uint8Array(resultList);
                    const blob = new Blob([uint8Array], { type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" });
                    
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement("a");
                    a.href = url;
                    a.download = `NC_Report_Multiple.xlsx`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    window.URL.revokeObjectURL(url);
                } catch (err) {
                    console.error(err);
                    setErrorMsg("Excelのエクスポート中にエラーが発生しました。");
                } finally {
                    setIsExporting(false);
                }
            };

            const getGridClass = () => {
                switch(viewerGridCols) {
                    case 1: return "grid-cols-1";
                    case 2: return "grid-cols-1 md:grid-cols-2";
                    case 3: return "grid-cols-1 md:grid-cols-2 lg:grid-cols-3";
                    case 4: return "grid-cols-1 md:grid-cols-2 lg:grid-cols-4";
                    default: return "grid-cols-1 md:grid-cols-2 lg:grid-cols-3";
                }
            };

            if (activeViewerMode) {
                return (
                    <div className="w-full px-4 py-6">
                        <header className="mb-4 border-b pb-4 flex justify-between items-center flex-wrap gap-4">
                            <div>
                                <h1 className="text-3xl font-bold text-gray-800 tracking-tight">NC値 レポートビューアー</h1>
                                <p className="text-gray-500 mt-1">計測データとNC曲線のレポートです。</p>
                            </div>
                            <div className="flex items-center space-x-6">
                                <div className="flex flex-col items-start max-w-sm">
                                    <label className="text-xs font-bold text-gray-600 mb-1">表示プロジェクト</label>
                                    <div className="flex flex-wrap gap-x-3 gap-y-1 text-xs">
                                        {projects.map(p => (
                                            <label key={p} className="flex items-center space-x-1 cursor-pointer">
                                                <input
                                                    type="checkbox"
                                                    checked={visibleProjects.includes(p)}
                                                    onChange={() => setVisibleProjects(prev => prev.includes(p) ? prev.filter(v => v !== p) : [...prev, p])}
                                                    className="rounded text-purple-600 w-3 h-3"
                                                />
                                                <span>{p}</span>
                                            </label>
                                        ))}
                                    </div>
                                </div>
                                <div className="flex flex-col items-center">
                                    <label className="text-xs font-bold text-gray-600 mb-1">カードサイズ（列数）</label>
                                    <div className="flex items-center space-x-2">
                                        <span className="text-xs text-gray-500">大</span>
                                        <input 
                                            type="range" 
                                            min="1" max="4" 
                                            value={viewerGridCols} 
                                            onChange={(e) => setViewerGridCols(Number(e.target.value))} 
                                            className="w-24"
                                        />
                                        <span className="text-xs text-gray-500">小</span>
                                    </div>
                                    <label className="mt-1 flex items-center gap-1 text-xs text-gray-600 cursor-pointer" title="カードサイズに関係なく、グラフ部分を添付2枚目と同じアスペクト比でコピーします">
                                        <input
                                            type="checkbox"
                                            checked={useFixedCopyAspectRatio}
                                            onChange={(e) => setUseFixedCopyAspectRatio(e.target.checked)}
                                            className="rounded text-blue-600 w-3 h-3"
                                        />
                                        <span>コピー比固定</span>
                                    </label>
                                </div>
                                <div className="flex space-x-2">
                                    {!isExportedViewerMode && (
                                        <button 
                                            onClick={() => setIsPreviewMode(false)}
                                            className="py-2 px-4 rounded-lg shadow text-sm font-bold bg-gray-500 hover:bg-gray-600 text-white transition-colors"
                                        >
                                            ✏️ 編集に戻る
                                        </button>
                                    )}
                                    <button 
                                        onClick={() => handleExportExcel()}
                                        disabled={!isPyodideReady || isExporting || dataItems.length === 0}
                                        className={`py-2 px-6 rounded-lg shadow text-sm font-bold text-white transition-colors flex items-center space-x-2
                                            ${!isPyodideReady || isExporting || dataItems.length === 0 ? 'bg-green-400 cursor-not-allowed' : 'bg-green-600 hover:bg-green-700'}`}
                                    >
                                        {isExporting ? <div className="loader border-white/30 border-t-white"></div> : <span>📊 Excel出力</span>}
                                    </button>
                                </div>
                            </div>
                        </header>
                        
                        {errorMsg && (
                            <div className="bg-red-50 text-red-600 p-3 rounded mb-4 whitespace-pre-wrap border border-red-200 text-sm">
                                {errorMsg}
                            </div>
                        )}

                        <div className={`grid gap-6 ${getGridClass()}`}>
                            {projectFilteredGroups.map((gName) => {
                                const items = groupedDataWithBg[gName];
                                if(!items) return null;
                                return (
                                    <GroupChart 
                                        key={gName} 
                                        groupName={gName} 
                                        projectName={groupProjects[gName] || defaultProjectName}
                                        items={items} 
                                        bgGraphItem={bgGraphData[gName]}
                                        addGraphItem={addGraphData[gName]}
                                        visibleNcCurves={visibleNcCurves} 
                                        lineWidth={lineWidth} 
                                        pointSize={pointSize}
                                        axisLineWidth={axisLineWidth}
                                        axisLabelFontSize={axisLabelFontSize}
                                        tickFontSize={tickFontSize}
                                        copyLegendFontSize={copyLegendFontSize}
                                        yAxisMaxAuto={yAxisMaxAuto}
                                        yAxisMaxManual={yAxisMaxManual}
                                        useFixedCopyAspectRatio={useFixedCopyAspectRatio}
                                        isViewerMode={true}
                                        setDataItems={setDataItems}
                                        setGroups={setGroups}
                                        onToggleVisible={handleToggleVisible}
                                        onMoveItems={handleMoveItems}
                                        groups={groups}
                                        projects={projects}
                                        groupProjects={groupProjects}
                                        onDuplicateGroup={handleDuplicateGroup}
                                        onMoveGroupToProject={handleMoveGroupToProject}
                                        onDragStart={(e) => handleDragStart(e, gName)}
                                        onDragOver={handleDragOver}
                                        onDrop={(e) => handleDrop(e, gName)}
                                        isDraggingThis={draggedGroup === gName}
                                    />
                                );
                            })}
                        </div>
                    </div>
                );
            }

            const mainColumns = [
                { id: 'fileName', title: 'ファイル名', readOnly: true },
                { id: 'legendName', title: '凡例名', readOnly: false },
                { id: 'groupName', title: 'グループ', readOnly: false, isSelect: true },
                { id: 'ncResult', title: '判定', readOnly: true }
            ];

            return (
                <div className="w-full px-2 py-4">
                    <header className="mb-4 border-b pb-3 flex justify-between items-end">
                        <div>
                            <h1 className="text-2xl font-bold text-gray-800 tracking-tight">NC値算出・レポートツール</h1>
                            <p className="text-gray-500 mt-1 text-sm">複数のXL2データをグループ分けしてグラフとExcelシートを生成します。</p>
                        </div>
                        <div className="flex flex-col space-y-2 items-end">
                            <div className="flex space-x-2">
                                <button
                                    onClick={handleOpenWorkspace}
                                    className="py-1 px-3 bg-gray-200 hover:bg-gray-300 text-gray-700 text-xs font-bold rounded shadow-sm transition-colors"
                                    title="読み込んだファイルを、以後の上書き保存先にします"
                                >
                                    📁 ワークスペース読込
                                </button>
                                <input ref={workspaceImportInputRef} type="file" className="hidden" accept=".json" onChange={handleImportJSON} />
                                <button
                                    onClick={handleUndo}
                                    disabled={!canUndo}
                                    className={`py-1 px-3 text-xs font-bold rounded shadow-sm transition-colors ${canUndo ? 'bg-amber-100 hover:bg-amber-200 text-amber-700' : 'bg-gray-100 text-gray-400 cursor-not-allowed'}`}
                                    title="元に戻す (Ctrl+Z)"
                                >
                                    ↶ Undo
                                </button>
                                <button
                                    onClick={handleRedo}
                                    disabled={!canRedo}
                                    className={`py-1 px-3 text-xs font-bold rounded shadow-sm transition-colors ${canRedo ? 'bg-amber-100 hover:bg-amber-200 text-amber-700' : 'bg-gray-100 text-gray-400 cursor-not-allowed'}`}
                                    title="やり直し (Ctrl+Y / Ctrl+Shift+Z)"
                                >
                                    ↷ Redo
                                </button>
                                <button 
                                    onClick={handleExportJSON}
                                    className="py-1 px-3 bg-gray-200 hover:bg-gray-300 text-gray-700 text-xs font-bold rounded shadow-sm transition-colors"
                                    title="従来どおりJSONをダウンロードします"
                                >
                                    💾 ワークスペース保存
                                </button>
                                <button
                                    onClick={handleSaveWorkspaceAs}
                                    className="py-1 px-3 bg-gray-200 hover:bg-gray-300 text-gray-700 text-xs font-bold rounded shadow-sm transition-colors"
                                    title="保存先を選んで、以後の上書き保存先にします"
                                >
                                    📝 名前を付けて保存
                                </button>
                                <button
                                    onClick={handleOverwriteWorkspace}
                                    className="py-1 px-3 bg-emerald-100 hover:bg-emerald-200 text-emerald-700 text-xs font-bold rounded shadow-sm transition-colors"
                                    title={workspaceFileHandle ? `${workspaceFileName} に上書き保存` : "保存先を選んでから上書き保存します"}
                                >

                                <button

                                <button

                                >
                                    🌐 HTML出力
                                </button>
                            </div>
                            <div className="text-[11px] text-gray-500 text-right max-w-xl">
                                <span className={workspaceFileHandle ? 'text-emerald-700 font-semibold' : 'text-amber-700 font-semibold'}>
                                    {workspaceFileHandle ? `上書き先: ${workspaceFileName}` : '上書き先: 未設定'}
                                </span>
                                {workspaceSaveStatus && <span className="ml-2">{workspaceSaveStatus}</span>}
                                {workspaceLastSavedAt && <span className="ml-2">最終保存: {new Date(workspaceLastSavedAt).toLocaleString()}</span>}
                            </div>
                       </div>
                    </header>

                    {showHtmlExportModal && (
                        <div className="fixed inset-0 z-[230] bg-black bg-opacity-40 flex items-center justify-center p-4">
                            <div className="bg-white rounded-xl shadow-2xl w-[480px] max-w-full overflow-hidden">
                                <div className="p-4 border-b bg-gray-50 flex justify-between items-center">
                                    <h3 className="font-bold text-gray-800">HTML出力するプロジェクト</h3>
                                    <button onClick={() => setShowHtmlExportModal(false)} className="text-gray-500 hover:text-gray-800 text-xl font-bold">&times;</button>
                                </div>
                                <div className="p-4 space-y-3">
                                    <p className="text-xs text-gray-500">出力HTMLに含めるプロジェクトを選択してください。</p>

                                                onDuplicateGroup={handleDuplicateGroup}
                                                onMoveGroupToProject={handleMoveGroupToProject}
                                                onDragStart={(e) => handleDragStart(e, gName)}
                                                onDragOver={handleDragOver}
                                                onDrop={(e) => handleDrop(e, gName)}
                                                isDraggingThis={draggedGroup === gName}
                                            />
                                        );
                                    })}
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
