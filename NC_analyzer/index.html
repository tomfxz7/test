            const getExportStateObject = () => {
                const htmlExportDataItems = dataItems.map(item => {
                    const { rawText, ...rest } = item;
                    return rest;
                });
                const htmlExportBgNoiseData = {};
                for (const [key, value] of Object.entries(bgNoiseData)) {
                    const { rawText, ...rest } = value;
                    htmlExportBgNoiseData[key] = rest;
                }
                return {
                    version: "1.3", 
                    dataItems: htmlExportDataItems, 
                    groups, 
                    projects,
                    groupProjects,
                    visibleProjects,
                    bgNoiseData: htmlExportBgNoiseData, 
                    bgCorrectionMethod, 
                    bgNoiseMode,
                    groupOctaveModes, 
                    visibleNcCurves, 
                    lineWidth, 
                    pointSize,
                    axisLineWidth,
                    axisLabelFontSize,
                    tickFontSize,
                    yAxisMaxAuto, 
                    yAxisMaxManual,
                    viewerGridCols
                };
            };

            const handleExportJSON = () => {
                const exportData = {
                    version: "1.4", dataItems, groups, projects, groupProjects, visibleProjects, bgNoiseData, bgCorrectionMethod, bgNoiseMode,
                    groupOctaveModes, visibleNcCurves, lineWidth, pointSize, axisLineWidth, axisLabelFontSize, tickFontSize, yAxisMaxAuto, yAxisMaxManual, viewerGridCols
                };
                const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `NC_Report_Settings.json`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            };

            const handleExportProjectJSON = (projectName = selectedProject) => {
                const projectGroups = groups.filter(g => (groupProjects[g] || defaultProjectName) === projectName);
                const projectGroupSet = new Set(projectGroups);
                const projectBgNoiseData = {};
                const projectGroupOctaveModes = {};
                projectGroups.forEach(g => {
                    if (bgNoiseData[g]) projectBgNoiseData[g] = bgNoiseData[g];
                    if (groupOctaveModes[g]) projectGroupOctaveModes[g] = groupOctaveModes[g];
                });
                const exportData = {
                    version: "1.4",
                    dataItems: dataItems.filter(item => projectGroupSet.has(item.groupName)),
                    groups: projectGroups,
                    projects: [projectName],
                    groupProjects: Object.fromEntries(projectGroups.map(g => [g, projectName])),
                    visibleProjects: [projectName],
                    bgNoiseData: projectBgNoiseData,
                    bgCorrectionMethod,
                    bgNoiseMode,
                    groupOctaveModes: projectGroupOctaveModes,
                    visibleNcCurves,
                    lineWidth,
                    pointSize,
                    axisLineWidth,
                    axisLabelFontSize,
                    tickFontSize,
                    yAxisMaxAuto,
                    yAxisMaxManual,
                    viewerGridCols
                };
                const safeProject = projectName.replace(/[\/:*?"<>|]/g, "_");
                const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `NC_Project_${safeProject}.json`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            };

            const handleExportHTML = () => {
                const babelScripts = document.querySelectorAll('script[type="text/babel"]');
                let appScript = '';
                if (babelScripts.length > 0) {
                    appScript = babelScripts[0].innerHTML;
                } else {
                    alert("ソースコードの取得に失敗しました。");
                    return;
                }

                const exportObj = getExportStateObject();
                // 確実にタグ干渉を防ぐためURLエンコード
                const safeData = encodeURIComponent(JSON.stringify(exportObj));

                const cleanHtml = `<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NC値レポートビューアー</title>
    <script src="https://cdn.tailwindcss.com"><\/script>
    <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"><\/script>
    <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"><\/script>
    <script src="https://unpkg.com/@babel/standalone@7.26.9/babel.min.js"><\/script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"><\/script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"><\/script>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"><\/script>
    <style>
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #3498db; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .select-none { user-select: none; -webkit-user-select: none; }
        .drag-handle { cursor: grab; }
        .drag-handle:active { cursor: grabbing; }
        .dragging { opacity: 0.5; border: 2px dashed #3b82f6; }
    </style>
</head>
<body class="bg-slate-50 text-gray-800 font-sans min-h-screen">
    <div id="root"></div>
    <script id="initial-data" type="text/plain">${safeData}<\/script>
    <script type="text/babel" data-presets="env,react">${appScript}<\/script>
</body>
</html>`;

                const blob = new Blob([cleanHtml], { type: 'text/html;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `NC_Report_Viewer.html`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            };

            const handleExportZip = async (projectNameFilter = null) => {
                const exportItems = projectNameFilter ? dataItems.filter(item => (groupProjects[item.groupName] || defaultProjectName) === projectNameFilter) : dataItems;
                if (exportItems.length === 0) return;
                setIsExporting(true);
                try {
                    const zip = new window.JSZip();
                    exportItems.forEach(item => {
                        const projectName = groupProjects[item.groupName] || defaultProjectName;
                        const safeProject = projectName.replace(/[\\/:*?"<>|]/g, "_");
                        const safeGroup = item.groupName.replace(/[\\/:*?"<>|]/g, "_");
                        const safeLegend = item.legendName.replace(/[\\/:*?"<>|]/g, "_");
                        const folder = zip.folder(safeProject).folder(safeGroup);
                        folder.file(`${safeProject}_${safeGroup}_${safeLegend}.txt`, item.rawText);
                    });
                    const blob = await zip.generateAsync({ type: "blob" });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `NC_Data_Files.zip`;
                    a.click();
                    URL.revokeObjectURL(url);
                } catch (e) {
                    alert("ZIPの作成に失敗しました: " + e.message);
                } finally {
                    setIsExporting(false);
                }
            };

            const makeUniqueName = (baseName, existingNames) => {
                let candidate = baseName || 'Untitled';
                let count = 2;
                while (existingNames.includes(candidate)) {
                    candidate = `${baseName || 'Untitled'} (${count})`;
                    count++;
                }
                return candidate;
            };

            const readJsonFile = (file) => new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        resolve(JSON.parse(event.target.result));
                    } catch (err) {
                        reject(err);
                    }
                };
                reader.onerror = reject;
                reader.readAsText(file);
            });

            const buildMergedProjectData = (baseState, importedData) => {
                const importedProjects = importedData.projects || ['Imported Project'];
                const importedGroups = importedData.groups || [];
                const importedGroupProjects = importedData.groupProjects || Object.fromEntries(importedGroups.map(g => [g, importedProjects[0]]));
                const projectMap = {};
                const groupMap = {};
                const nextProjects = [...baseState.projects];
                const nextGroups = [...baseState.groups];

                importedProjects.forEach(projectName => {
                    const uniqueProject = makeUniqueName(projectName, nextProjects);
                    projectMap[projectName] = uniqueProject;
                    nextProjects.push(uniqueProject);
                });

                importedGroups.forEach(groupName => {
                    const uniqueGroup = makeUniqueName(groupName, nextGroups);
                    groupMap[groupName] = uniqueGroup;
                    nextGroups.push(uniqueGroup);
                });

                const nextGroupProjects = { ...baseState.groupProjects };
                importedGroups.forEach(groupName => {
                    const sourceProject = importedGroupProjects[groupName] || importedProjects[0];
                    nextGroupProjects[groupMap[groupName]] = projectMap[sourceProject] || projectMap[importedProjects[0]] || nextProjects[0];
                });

                const nextDataItems = [
                    ...baseState.dataItems,
                    ...(importedData.dataItems || []).map(item => ({
                        ...item,
                        id: Math.random().toString(36).substring(2, 9),
                        groupName: groupMap[item.groupName] || item.groupName
                    }))
                ];

                const nextBgNoiseData = { ...baseState.bgNoiseData };
                Object.entries(importedData.bgNoiseData || {}).forEach(([groupName, value]) => {
                    nextBgNoiseData[groupMap[groupName] || groupName] = value;
                });

                const nextGroupOctaveModes = { ...baseState.groupOctaveModes };
                Object.entries(importedData.groupOctaveModes || {}).forEach(([groupName, value]) => {
                    nextGroupOctaveModes[groupMap[groupName] || groupName] = value;
                });

                return {
                    ...baseState,
                    projects: nextProjects,
                    groups: nextGroups,
                    groupProjects: nextGroupProjects,
                    dataItems: nextDataItems,
                    bgNoiseData: nextBgNoiseData,
                    groupOctaveModes: nextGroupOctaveModes,
                    visibleProjects: [...new Set([...baseState.visibleProjects, ...Object.values(projectMap)])]
                };
            };

            const applyWorkspaceData = (importedData) => {
                const importedProjects = importedData.projects || [defaultProjectName];
                const importedGroups = importedData.groups || ['Group 1'];
                setProjects(importedProjects);
                setSelectedProject(importedProjects[0] || defaultProjectName);
                setVisibleProjects(importedData.visibleProjects || importedProjects);
                setGroups(importedGroups);
                setGroupProjects(importedData.groupProjects || Object.fromEntries(importedGroups.map(g => [g, importedProjects[0] || defaultProjectName])));
                setDataItems(importedData.dataItems || []);
                setBgNoiseData(importedData.bgNoiseData || {});
                if(importedData.bgCorrectionMethod !== undefined) setBgCorrectionMethod(importedData.bgCorrectionMethod);
                if(importedData.bgNoiseMode !== undefined) setBgNoiseMode(importedData.bgNoiseMode);
                setGroupOctaveModes(importedData.groupOctaveModes || {});

            const handleImportJSON = async (e) => {

                }

            };

            const parseCsvLine = (line) => line.split(',').map(cell => cell.trim());

            const parseFrequencyLabel = (label) => {
                const normalized = label.trim().toLowerCase();
                const match = normalized.match(/^(\d+(?:\.\d+)?)(k)?$/);
                if (!match) return NaN;
                const value = parseFloat(match[1]);
                return match[2] ? value * 1000 : value;
            };

            const parseLpeqCsv = (lines) => {
                const headerLine = lines.find(line => /^\s*Mode\s*,/i.test(line));
                if (!headerLine) return null;

                const headers = parseCsvLine(headerLine);
                const lpeqLine = lines.find(line => /^\s*Lpeq\s*,/i.test(line));
                if (!lpeqLine) return null;

                const values = parseCsvLine(lpeqLine);
                const rawFreqs = [];
                const rawValues = [];
                headers.forEach((header, index) => {
                    const freq = parseFrequencyLabel(header);
                    if (freq >= 63 && freq <= 8000) {
                        const value = parseFloat(values[index]);
                        if (!isNaN(value)) {
                            rawFreqs.push(freq);
                            rawValues.push(value);
                        }
                    }
                });

                if (rawFreqs.length === 0) return null;
                return { isThirdOct: false, rawFreqs, rawValues };
            };

            const readAndParseFile = (file) => {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        try {
                            const text = event.target.result;
                            const lines = text.split(/\r?\n/);

                            const csvParsed = parseLpeqCsv(lines);
                            if (csvParsed) {
                                resolve({ ...csvParsed, fileName: file.name, rawText: text });
                                return;
                            }

                            let isThirdOct = false;
                            let hzLine = null;
                            let eqLine = null;
                            
                            for (let line of lines) {
                                if (line.includes('Resolution:') && line.includes('1/3')) isThirdOct = true;
                                if (line.includes('Band [Hz]')) hzLine = line;
                                if (line.includes('LZeq') || line.includes('LAeq') || line.includes('LCeq') || line.match(/\bLeq\b/)) {
                                    if (!eqLine) eqLine = line;
                                }
                            }
                            if (!hzLine || !eqLine) throw new Error(`${file.name}: 指定フォーマットのデータが見つかりません。`);

                            const rawFreqs = hzLine.trim().split(/[\s\t]+/).map(s => parseFloat(s)).filter(n => !isNaN(n));
                            const valsStr = eqLine.trim().split(/[\s\t]+/).slice(1);
                            const rawValues = valsStr.map(s => parseFloat(s));
                            
                            resolve({ isThirdOct, rawFreqs, rawValues, fileName: file.name, rawText: text });
                        } catch(err) {
                            reject(err);
                        }
                    }
                    reader.readAsText(file);
                });
            };

            const handleMoveItems = (selectedIds, direction, orderedDisplayIds = null) => {
                setDataItems(prev => {
                    const arr = [...prev];
                    const selectedIdSet = new Set(selectedIds);

                    if (orderedDisplayIds && orderedDisplayIds.length > 0) {
                        const visibleIds = orderedDisplayIds.filter(id => arr.some(item => item.id === id));
                        const selectedVisibleIndices = visibleIds
                            .map((id, index) => selectedIdSet.has(id) ? index : -1)
                            .filter(index => index !== -1);
                        if (selectedVisibleIndices.length === 0) return prev;

                        if (direction === 'up') {
                            if (selectedVisibleIndices[0] === 0) return prev;
                            selectedVisibleIndices.forEach(index => {
                                [visibleIds[index - 1], visibleIds[index]] = [visibleIds[index], visibleIds[index - 1]];
                            });
                        } else if (direction === 'down') {
                            if (selectedVisibleIndices[selectedVisibleIndices.length - 1] === visibleIds.length - 1) return prev;
                            for (let i = selectedVisibleIndices.length - 1; i >= 0; i--) {
                                const index = selectedVisibleIndices[i];
                                [visibleIds[index + 1], visibleIds[index]] = [visibleIds[index], visibleIds[index + 1]];
                            }
                        }

                        const visibleItemsById = Object.fromEntries(arr.filter(item => visibleIds.includes(item.id)).map(item => [item.id, item]));
                        const reorderedVisibleItems = visibleIds.map(id => visibleItemsById[id]);
                        let visibleCursor = 0;
                        return arr.map(item => orderedDisplayIds.includes(item.id) ? reorderedVisibleItems[visibleCursor++] : item);
                    }

                    const selectedIndices = selectedIds.map(id => arr.findIndex(i => i.id === id)).filter(idx => idx !== -1).sort((a, b) => a - b);
                    if (selectedIndices.length === 0) return prev;

                    if (direction === 'up') {
                        if (selectedIndices[0] === 0) return prev;
                        for (let i = 0; i < selectedIndices.length; i++) {
                            const idx = selectedIndices[i];
                            [arr[idx - 1], arr[idx]] = [arr[idx], arr[idx - 1]];

                                                <div className="flex items-center text-[10px]">
                                                    <span className="w-8 text-gray-500">暗騒音:</span>
                                                    <label className="cursor-pointer bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 py-0.5 px-1.5 rounded shadow-sm">
                                                        選択
                                                        <input type="file" className="hidden" accept=".txt,.csv" onChange={(e) => handleBgFileUpload(e, g)} />
                                                    </label>
                                                    <span className="ml-1 text-gray-400 truncate flex-1" title={bgNoiseData[g]?.fileName}>
                                                        {bgNoiseData[g] ? `✓ ${bgNoiseData[g].fileName}` : "未設定"}
                                                    </span>
                                                    {bgNoiseData[g] && (
                                                        <button onClick={() => handleClearBgNoise(g)} className="ml-1 text-red-400 hover:text-red-600 font-bold px-1" title="クリア">&times;</button>
                                                    )}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* 中央カラム: テーブル */}
                        <div className="xl:col-span-1 flex flex-col min-h-0">
                            {dataItems.length > 0 && (
                                <div className={isTableMaximized ? "fixed inset-4 z-[100] bg-white p-6 rounded-xl shadow-2xl border border-gray-300 flex flex-col" : "bg-white p-3 rounded-xl shadow-sm border border-gray-200 flex-grow flex flex-col h-full min-h-[500px]"}>
                                    <div className="flex justify-between items-center mb-1 shrink-0">
                                        <h2 className="text-base font-semibold text-gray-700">3. データ設定</h2>
                                        <button onClick={() => setIsTableMaximized(!isTableMaximized)} className="text-sm bg-blue-50 hover:bg-blue-100 text-blue-700 py-1 px-3 rounded shadow-sm border border-blue-200 font-bold">
                                            {isTableMaximized ? "🗕 縮小" : "⛶ 最大化"}
                                        </button>
                                    </div>
                                    <p className="text-[10px] text-gray-500 mb-2 leading-tight shrink-0">
                                        ドラッグ・Ctrl・Shiftで複数セル選択し、上下移動や一括チェック、コピペ可能。<br/>
                                        <span className="text-blue-500 font-medium">※入力中 Tab/Enter で下のセルへ移動します。</span>
                                    </p>
                                    
                                    <div className="flex-grow min-h-0 relative">
                                        <div className="absolute inset-0">
                                            <DataTable 
                                                displayItems={displayItems}
                                                groups={selectedProjectGroups}
                                                columns={mainColumns}
                                                setGroups={setGroups}
                                                projects={projects}
                                                groupProjects={groupProjects}
                                                setDataItems={setDataItems}
                                                onRemoveItem={handleRemoveItem}
                                                onToggleVisible={handleToggleVisible}
                                                onMoveItems={handleMoveItems}
                                            />
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>

                        {/* 右カラム: グラフ表示 */}
                        <div className="xl:col-span-2">
                            {dataItems.length === 0 ? (
                                <div className="h-full min-h-[400px] border-2 border-dashed border-gray-200 rounded-xl flex items-center justify-center text-gray-400 bg-white">
                                    データを追加するとグループごとにグラフが表示されます
                                </div>
                            ) : (
                                <div className="space-y-4">
                                    {selectedProjectGroups.map(gName => {
                                        const items = groupedDataWithBg[gName];
                                        if(!items) return null;
                                        return (
                                            <GroupChart 
                                                key={gName} 
                                                groupName={gName} 
                                                projectName={groupProjects[gName] || defaultProjectName}
                                                items={items} 
                                                bgGraphItem={bgGraphData[gName]}
                                                visibleNcCurves={visibleNcCurves} 
                                                lineWidth={lineWidth} 
                                                pointSize={pointSize}
                                                axisLineWidth={axisLineWidth}
                                                axisLabelFontSize={axisLabelFontSize}
                                                tickFontSize={tickFontSize}
                                                yAxisMaxAuto={yAxisMaxAuto}
                                                yAxisMaxManual={yAxisMaxManual}
                                                isViewerMode={false}
                                                setDataItems={setDataItems}
                                                setGroups={setGroups}
                                                onRemoveItem={handleRemoveItem}
                                                onToggleVisible={handleToggleVisible}
                                                onMoveItems={handleMoveItems}
                                                groups={groups}
                                                projects={projects}
                                                groupProjects={groupProjects}
                                                onDuplicateGroup={handleDuplicateGroup}
                                                onMoveGroupToProject={handleMoveGroupToProject}
                                                onDragStart={(e) => handleDragStart(e, gName)}
                                                onDragOver={handleDragOver}
                                                onDrop={(e) => handleDrop(e, gName)}
                                                isDraggingThis={draggedGroup === gName}
                                            />
                                        );
                                    })}
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
