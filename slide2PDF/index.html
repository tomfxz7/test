<body class="bg-gray-900 h-screen flex flex-col overflow-hidden text-gray-100">

<div class="slide-container">
  <h2 class="slide-title">アプリの<span>概要</span></h2>
  <div class="content-area">
    <div class="two-column">
      <div class="content-container">
        <ul class="bullet-list">
          <li><strong>手軽なデータ入力:</strong> CSVファイルのドロップやExcelデータのコピペにネイティブ対応。</li>

    </script>

    <script>
        /* 1. エディタ設定 */
        const defaultCode = document.getElementById('default-template').textContent.trim();
        const editorTextArea = document.getElementById('editor');
        editorTextArea.value = defaultCode;
        
        const editor = CodeMirror.fromTextArea(editorTextArea, {
            mode: 'htmlmixed',
            theme: 'dracula',
            lineNumbers: true,
            lineWrapping: true,
            autoCloseTags: true
        });

        const iframe = document.getElementById('preview');
        const iframeWrapper = document.getElementById('iframeWrapper');
        const scaleContainer = document.getElementById('scaleContainer');
        const previewContainer = document.getElementById('previewContainer');
        const slideSizeSelect = document.getElementById('slideSize');
        const previewSizeText = document.getElementById('previewSizeText');

        /* 2. サイズ設定とプレビューの更新 */
        function getSelectedSize() {
            const sizeParts = slideSizeSelect.value.split(' ');
            return { width: sizeParts[0], height: sizeParts[1] };
        }

        // Webアプリ内部のプレビュー画面のサイズとスケールを調整
        function updatePreviewWrapper() {
            const size = getSelectedSize();
            const targetWidth = parseInt(size.width);
            const targetHeight = parseInt(size.height);

            iframeWrapper.style.width = `${targetWidth}px`;
            iframeWrapper.style.height = `${targetHeight}px`;
            previewSizeText.innerText = `Target: ${targetWidth}px x ${targetHeight}px`;

            // プレビュー領域に合わせて最大限大きく表示されるようスケール計算
            // (p-6 のパディング: 24px * 2 = 48px を除外)
            const availableWidth = previewContainer.clientWidth - 48;
            const availableHeight = previewContainer.clientHeight - 48;

            const scaleX = availableWidth / targetWidth;
            const scaleY = availableHeight / targetHeight;
            // 幅と高さのどちらか厳しい方に合わせる（最大1.0倍まで）
            const scale = Math.min(scaleX, scaleY, 1);

            // iframe自体をスケールダウン
            iframeWrapper.style.transform = `scale(${scale})`;
            
            // 外側のコンテナサイズをスケール後の実寸サイズに合わせる（無駄な余白を防ぐ）
            scaleContainer.style.width = `${targetWidth * scale}px`;
            scaleContainer.style.height = `${targetHeight * scale}px`;
        }

        // 入力されたHTMLを解析し、ツール側で強制的に印刷CSSを埋め込んでプレビューに反映
        function updatePreview() {
            const code = editor.getValue();
            const size = getSelectedSize();
            const sizeStr = `${size.width} ${size.height}`;
            
            const parser = new DOMParser();
            const doc = parser.parseFromString(code, 'text/html');

            // --- ツールの中核：完璧にPDF化するためのCSSを強制注入 ---
            const style = doc.createElement('style');
            style.id = 'converter-injected-style';
            style.innerHTML = `
                /* プレビュー画面でのbodyリセット */
                body { margin: 0; padding: 0; min-height: 0 !important; }

                /* 印刷時（PDF保存時）の絶対ルール */
                @media print {
                    @page {
                        size: ${sizeStr};
                        margin: 0 !important;
                    }
                    html, body {
                        width: ${size.width} !important;
                        height: auto !important;
                        margin: 0 !important;
                        padding: 0 !important;
                        background: transparent !important;
                        display: block !important;
                    }
                    .slide-container {
                        width: ${size.width} !important;
                        height: ${size.height} !important;
                        max-height: ${size.height} !important;
                        margin: 0 !important;
                        box-sizing: border-box !important;
                        page-break-after: always !important;
                        break-after: page !important;
                        page-break-inside: avoid !important;
                        break-inside: avoid !important;
                        overflow: hidden !important;
                        box-shadow: none !important;
                        border-radius: 0 !important;
                    }
                    .slide-container:last-child {
                        page-break-after: auto !important;
                        break-after: auto !important;
                    }
                    * {
                        -webkit-print-color-adjust: exact !important;
                        print-color-adjust: exact !important;
                    }
                }
            `;
            doc.head.appendChild(style);

            // DOCTYPEを付与して Quirks Mode を防ぐ
            iframe.srcdoc = "<!DOCTYPE html>\n" + doc.documentElement.outerHTML;
            updatePreviewWrapper();
        }

        // イベントリスナー
        slideSizeSelect.addEventListener('change', updatePreview);
        window.addEventListener('resize', updatePreviewWrapper);

        let timeout;
        editor.on('change', () => {
            clearTimeout(timeout);
            timeout = setTimeout(updatePreview, 300);
        });

        // 初期化
        updatePreview();

        /* 3. エクスポート機能（ツールのメイン機能） */
        function getReadyHtml() {
            // iframeに注入済みの（PDF化に最適化された）HTMLを取得
            let printReadyHtml = iframe.srcdoc;
            
            // 自動で印刷ダイアログを開くスクリプトを追加
            const autoPrintScript = `\n<script>
                window.onload = function() {
                    setTimeout(() => { window.print(); }, 500);
                };
            <\/script>\n</body>`;
            
            if (printReadyHtml.includes('</body>')) {
                printReadyHtml = printReadyHtml.replace('</body>', autoPrintScript);
            } else {
                printReadyHtml += autoPrintScript;
            }
            return printReadyHtml;
        }

        // 「PDF出力画面を開く」ボタン（ツールとして別タブで印刷処理を実行）
        document.getElementById('printBtn').addEventListener('click', () => {
            const html = getReadyHtml();
            const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            
            // 新しいタブで開いて自動印刷
            const newWin = window.open(url, '_blank');
            if (!newWin) {
                alert("ブラウザのポップアップブロックが有効になっています。\n左側の「HTML保存」ボタンからダウンロードして開いてください。");
            }
        });

        // 「HTML保存」ボタン（ポップアップブロック対策 兼 ファイル保存用）
        document.getElementById('downloadHtmlBtn').addEventListener('click', () => {
            const html = getReadyHtml();
            const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = "slide_to_print.html";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        });
    </script>
    <style>
        /* プレビュー背景のドットパターン */
        .pattern-dots {
            background-image: radial-gradient(#9ca3af 1px, transparent 1px);
            background-size: 20px 20px;
        }
    </style>
</body>
